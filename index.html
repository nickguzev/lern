<style>
:root {
  --bg:       #f7f5f0;
  --surface:  #ffffff;
  --ink:      #1a1814;
  --ink2:     #3d3a33;
  --muted:    #9b9589;
  --border:   #e8e4dc;
  --border2:  #d4cfc4;
  --accent:   #2d6a4f;
  --accent2:  #40916c;
  --amber:    #e09f3e;
  --red:      #c1440e;
  --green:    #2d6a4f;
  --tag-bg:   #eef4f1;
  --tag-text: #2d6a4f;
}

- { margin:0; padding:0; box-sizing:border-box; }

html { scroll-behavior: smooth; }

body {
font-family: ‘DM Sans’, sans-serif;
background: var(–bg);
color: var(–ink);
min-height: 100vh;
-webkit-font-smoothing: antialiased;
}

/* ── SCREENS ── */
.screen {
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 2rem 1.5rem;
animation: up .35s ease both;
}
.screen.top { justify-content: flex-start; padding-top: 72px; }

@keyframes up {
from { opacity:0; transform:translateY(14px); }
to   { opacity:1; transform:translateY(0); }
}

.wrap { width:100%; max-width:620px; }

/* ── NAV ── */
.nav {
position: fixed; top:0; left:0; right:0;
height: 56px;
background: rgba(247,245,240,0.92);
backdrop-filter: blur(10px);
border-bottom: 1px solid var(–border);
display: flex; align-items: center; justify-content: space-between;
padding: 0 1.5rem;
z-index: 100;
}
.nav-logo {
font-family: ‘Fraunces’, serif;
font-size: 1.3rem;
font-weight: 600;
letter-spacing: -.02em;
color: var(–ink);
}
.nav-logo span { color: var(–accent); }

/* ── TYPOGRAPHY ── */
.serif { font-family: ‘Fraunces’, serif; }
.mono  { font-family: ‘DM Mono’, monospace; }

h1.display {
font-family: ‘Fraunces’, serif;
font-size: clamp(2.6rem, 6vw, 3.8rem);
font-weight: 300;
line-height: 1.08;
letter-spacing: -.03em;
color: var(–ink);
}
h1.display em { font-style: italic; color: var(–accent); }

h2.title {
font-family: ‘Fraunces’, serif;
font-size: 1.9rem;
font-weight: 400;
letter-spacing: -.02em;
line-height: 1.2;
}

.label {
font-family: ‘DM Mono’, monospace;
font-size: 0.68rem;
letter-spacing: .12em;
text-transform: uppercase;
color: var(–muted);
}
.label.green { color: var(–accent); }

.tag {
display: inline-block;
background: var(–tag-bg);
color: var(–tag-text);
font-family: ‘DM Mono’, monospace;
font-size: .68rem;
letter-spacing: .08em;
text-transform: uppercase;
padding: .25rem .6rem;
border-radius: 4px;
}

/* ── DIVIDER ── */
.rule { height:1px; background:var(–border); margin:1.5rem 0; }

/* ── BUTTONS ── */
.btn {
display: inline-flex; align-items: center; justify-content: center; gap: .5rem;
padding: .85rem 1.75rem;
font-family: ‘DM Sans’, sans-serif;
font-size: .9rem; font-weight: 600;
border: none; border-radius: 6px;
cursor: pointer;
transition: all .18s ease;
}
.btn-primary { background: var(–ink); color: var(–bg); }
.btn-primary:hover { background: var(–ink2); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(26,24,20,.18); }
.btn-accent  { background: var(–accent); color: #fff; }
.btn-accent:hover { background: var(–accent2); transform: translateY(-1px); }
.btn-ghost   { background: transparent; color: var(–ink2); border: 1px solid var(–border2); }
.btn-ghost:hover { border-color: var(–ink); color: var(–ink); }
.btn-surface { background: var(–surface); color: var(–ink); border: 1px solid var(–border); }
.btn-surface:hover { border-color: var(–border2); }
.btn.w { width:100%; }
.btn.sm { padding: .5rem .875rem; font-size: .82rem; }

/* ── INPUT ── */
.field { margin-bottom: 1.25rem; }
.field label { display:block; font-size:.82rem; font-weight:500; margin-bottom:.4rem; color:var(–ink2); }
.input {
width:100%;
background: var(–surface);
border: 1px solid var(–border2);
border-radius: 6px;
padding: .8rem 1rem;
font-family: ‘DM Sans’, sans-serif;
font-size: .95rem;
color: var(–ink);
outline: none;
transition: border-color .15s, box-shadow .15s;
}
.input:focus { border-color: var(–accent); box-shadow: 0 0 0 3px rgba(45,106,79,.1); }
.input::placeholder { color: var(–muted); }

/* ── CARDS ── */
.card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 10px;
padding: 1.5rem;
margin-bottom: 1rem;
}
.card.accent-left { border-left: 3px solid var(–accent); }
.card.hover { cursor:pointer; transition: border-color .2s, box-shadow .2s, transform .2s; }
.card.hover:hover { border-color: var(–border2); box-shadow: 0 4px 20px rgba(26,24,20,.07); transform: translateY(-2px); }

/* ── COURSE CARD ── */
.course-card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 12px;
padding: 1.5rem;
cursor: pointer;
transition: all .22s ease;
position: relative;
}
.course-card:hover { border-color: var(–accent); box-shadow: 0 6px 24px rgba(45,106,79,.1); transform: translateY(-2px); }
.course-card.locked { opacity:.45; cursor:default; pointer-events:none; }
.course-card .course-title { font-family:‘Fraunces’,serif; font-size:1.15rem; font-weight:400; margin:.5rem 0 .35rem; }
.course-card .course-desc  { font-size:.83rem; color:var(–muted); line-height:1.55; }
.course-card .course-meta  { display:flex; gap:1rem; margin-top:1rem; padding-top:1rem; border-top:1px solid var(–border); font-family:‘DM Mono’,monospace; font-size:.7rem; color:var(–muted); }
.lock-badge { position:absolute; top:1rem; right:1rem; background:var(–border); color:var(–muted); font-family:‘DM Mono’,monospace; font-size:.65rem; padding:.2rem .5rem; border-radius:4px; }

/* ── PROGRESS ── */
.prog-bar { width:100%; height:2px; background:var(–border); border-radius:2px; overflow:hidden; margin-bottom:2rem; }
.prog-fill { height:100%; background:var(–accent); border-radius:2px; transition: width .5s cubic-bezier(.4,0,.2,1); }

/* ── MODULE PROGRESS ── */
.module-list { display:flex; flex-direction:column; gap:.5rem; margin: 1rem 0; }
.module-row {
display:flex; align-items:center; gap:1rem;
padding:.875rem 1rem;
background:var(–surface); border:1px solid var(–border); border-radius:8px;
transition: border-color .15s;
}
.module-row.active { border-color:var(–accent); background:var(–tag-bg); }
.module-row.done   { opacity:.6; }
.mod-num {
width:28px; height:28px; border-radius:50%;
border:1px solid var(–border2);
display:flex; align-items:center; justify-content:center;
font-family:‘DM Mono’,monospace; font-size:.7rem; color:var(–muted);
flex-shrink:0;
}
.module-row.done .mod-num   { background:var(–accent); border-color:var(–accent); color:#fff; font-size:.8rem; }
.module-row.active .mod-num { background:var(–accent); border-color:var(–accent); color:#fff; }
.mod-info { flex:1; }
.mod-title { font-size:.9rem; font-weight:500; }
.mod-sub   { font-size:.75rem; color:var(–muted); margin-top:.15rem; }
.mod-lessons { font-family:‘DM Mono’,monospace; font-size:.68rem; color:var(–muted); }

/* ── OPTIONS ── */
.option {
width:100%; text-align:left;
background:var(–surface); border:1px solid var(–border); border-radius:8px;
padding:.9rem 1.1rem; margin-bottom:.5rem;
cursor:pointer;
font-family:‘DM Sans’,sans-serif; font-size:.9rem; color:var(–ink);
display:flex; align-items:center; gap:.75rem;
transition: all .15s ease;
}
.option:hover:not(:disabled) { border-color:var(–accent); background:var(–tag-bg); transform:translateX(3px); }
.option.correct { border-color:var(–green); background:rgba(45,106,79,.06); color:var(–green); }
.option.wrong   { border-color:var(–red);   background:rgba(193,68,14,.06);  color:var(–red); }
.option.reveal  { border-color:var(–green); color:var(–green); opacity:.55; }
.opt-key {
width:22px; height:22px; border-radius:5px;
border:1px solid currentColor; opacity:.5;
display:flex; align-items:center; justify-content:center;
font-family:‘DM Mono’,monospace; font-size:.68rem;
flex-shrink:0;
}

/* ── PILLS ── */
.pills { display:flex; gap:.5rem; flex-wrap:wrap; }
.pill {
padding:.45rem .9rem; border-radius:100px;
border:1px solid var(–border2);
font-size:.82rem; font-weight:500;
cursor:pointer; color:var(–muted);
background:var(–surface);
transition: all .15s;
}
.pill:hover  { border-color:var(–accent); color:var(–accent); }
.pill.active { background:var(–accent); border-color:var(–accent); color:#fff; }

/* ── RANGE ── */
.range-wrap { margin:.75rem 0; }
.range-row  { display:flex; justify-content:space-between; margin-bottom:.5rem; font-size:.82rem; }
.range-val  { font-family:‘DM Mono’,monospace; font-weight:500; color:var(–accent); }
input[type=range] {
width:100%; -webkit-appearance:none;
height:2px; background:var(–border2); border-radius:2px; outline:none;
}
input[type=range]::-webkit-slider-thumb {
-webkit-appearance:none; width:16px; height:16px; border-radius:50%;
background:var(–accent); cursor:pointer;
box-shadow:0 0 0 3px var(–bg);
}

/* ── LESSON CONTENT ── */
.lesson-body {
font-family: ‘DM Sans’, sans-serif;
font-size: 1rem; line-height: 1.85;
color: var(–ink2);
}
.lesson-body h3 {
font-family:‘Fraunces’,serif; font-size:1.1rem; font-weight:400;
color:var(–ink); margin:1.75rem 0 .5rem; letter-spacing:-.01em;
}
.lesson-body p { margin-bottom:.75rem; }
.lesson-body .hl {
background: rgba(45,106,79,.1);
color: var(–accent);
padding:.05rem .35rem; border-radius:3px;
}
.lesson-body .example {
background: var(–bg);
border-left: 2px solid var(–amber);
padding: .875rem 1.1rem;
border-radius:0 6px 6px 0;
margin: 1rem 0;
font-size:.92rem; color:var(–ink2);
}
.lesson-body .example strong { color:var(–ink); }
.lesson-body .formula {
font-family:‘DM Mono’,monospace; font-size:.82rem;
background:var(–ink); color: #a8d5be;
padding:.75rem 1rem; border-radius:6px;
margin:1rem 0; display:block;
}
.lesson-body .case-box {
background: var(–surface);
border: 1px solid var(–border);
border-top: 3px solid var(–amber);
border-radius: 0 0 8px 8px;
padding: 1.25rem;
margin: 1.5rem 0;
}
.lesson-body .case-box .case-label {
font-family:‘DM Mono’,monospace; font-size:.65rem;
letter-spacing:.1em; text-transform:uppercase;
color:var(–amber); margin-bottom:.5rem; display:block;
}

/* ── AI PANEL ── */
.ai-panel {
background: var(–ink);
color: #e8e4dc;
border-radius:10px;
padding:1.25rem;
margin-top:1rem;
animation: up .25s ease;
}
.ai-panel .label { color: #6db38a; }
.ai-body {
font-family:‘DM Sans’,sans-serif; font-size:.9rem;
line-height:1.7; color:#c8c4bc; margin-top:.5rem;
}
.ai-row {
display:flex; gap:.5rem; margin-top:1rem;
padding-top:1rem; border-top:1px solid rgba(255,255,255,.08);
}
.ai-input {
flex:1; background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.12); border-radius:6px;
padding:.6rem .875rem; color:#e8e4dc;
font-family:‘DM Sans’,sans-serif; font-size:.85rem; outline:none;
}
.ai-input:focus { border-color: #6db38a; }
.ai-input::placeholder { color:rgba(255,255,255,.25); }
.ai-send {
background: var(–accent); color:#fff;
border:none; border-radius:6px;
padding:.6rem 1rem; cursor:pointer;
font-family:‘DM Sans’,sans-serif; font-size:.82rem; font-weight:600;
transition:opacity .15s;
}
.ai-send:hover { opacity:.85; }

/* ── PREMIUM BADGE ── */
.premium-badge {
display:inline-flex; align-items:center; gap:.3rem;
background: linear-gradient(135deg,#e09f3e,#f4c261);
color:#5a3e00;
font-family:‘DM Mono’,monospace; font-size:.65rem;
padding:.2rem .5rem; border-radius:4px; font-weight:500;
}

/* ── LOADER ── */
.loader {
display:flex; flex-direction:column; align-items:center;
justify-content:center; gap:1.5rem; min-height:280px; text-align:center;
}
.spin {
width:48px; height:48px; border-radius:50%;
border:2px solid var(–border2); border-top-color:var(–accent);
animation: spin .8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

.dots { display:flex; gap:3px; align-items:center; }
.dots span {
width:6px; height:6px; background:var(–accent); border-radius:50%;
animation: dot 1.2s infinite;
}
.dots span:nth-child(2) { animation-delay:.2s; }
.dots span:nth-child(3) { animation-delay:.4s; }
@keyframes dot {
0%,60%,100% { transform:scale(1); opacity:.4; }
30% { transform:scale(1.35); opacity:1; }
}

/* ── XP ── */
.xp {
display:inline-flex; align-items:center; gap:.3rem;
background:var(–tag-bg); color:var(–accent);
font-family:‘DM Mono’,monospace; font-size:.72rem;
padding:.25rem .65rem; border-radius:100px;
}

/* ── STATS ── */
.stats { display:flex; gap:1.5rem; margin:1.5rem 0; }
.stat-num { font-family:‘Fraunces’,serif; font-size:2rem; font-weight:300; line-height:1; }
.stat-lbl { font-family:‘DM Mono’,monospace; font-size:.65rem; color:var(–muted); text-transform:uppercase; letter-spacing:.08em; margin-top:.2rem; }

/* ── OFFLINE INDICATOR ── */
.offline-dot {
width:6px; height:6px; border-radius:50%; background:var(–green);
display:inline-block; margin-right:.3rem;
}

/* ── UTIL ── */
.mt1 { margin-top:.5rem; }
.mt2 { margin-top:1rem; }
.mt3 { margin-top:1.5rem; }
.mt4 { margin-top:2rem; }
.mb1 { margin-bottom:.5rem; }
.mb2 { margin-bottom:1rem; }
.tc  { text-align:center; }
.muted { color:var(–muted); }
.small { font-size:.82rem; }

@media(max-width:600px) {
.screen { padding:1rem; }
.screen.top { padding-top:64px; }
h1.display { font-size:2.4rem; }
}
</style>

      <p class="muted serif mt1">${t('wellDone')}, ${S.user?.name?.split(' ')[0]||''}!</p>
      <div class="rule"></div>
      <div class="stats" style="justify-content:center;">
        <div><div class="stat-num">${S.xp}</div><div class="stat-lbl">XP</div></div>
        <div><div class="stat-num">${S.lessonTotal}</div><div class="stat-lbl">${t('lessons')}</div></div>
        <div><div class="stat-num">${S.level[0].toUpperCase()}</div><div class="stat-lbl">${t(S.level)}</div></div>
      </div>
      <button class="btn btn-primary w mt3" style="padding:1rem;" onclick="go('catalog')">${t('backCatalog')}</button>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════
// CREATE COURSE (Premium)
// ═══════════════════════════════════════════
function createCourse() {
return `

  <div class="screen top">
    <div class="nav">
      <button class="btn btn-ghost sm" onclick="go('catalog')">${t('back')}</button>
      <span class="premium-badge">Premium</span>
    </div>
    <div class="wrap">
      <div style="margin-bottom:1.75rem;">
        <div class="label green">${t('createTitle')}</div>
        <h2 class="title" style="margin-top:.3rem;">${t('createSub')}</h2>
      </div>

```
  <div class="field">
    <label>${t('courseName')}</label>
    <input class="input" id="ctitle" placeholder="${t('courseNamePh')}" value="${S.customTitle}" oninput="S.customTitle=this.value" />
  </div>
  <div class="field">
    <label>${t('courseDescLabel')}</label>
    <textarea class="input" id="cdesc" placeholder="${t('courseDescPh')}" rows="3" style="resize:vertical;" oninput="S.customDesc=this.value">${S.customDesc}</textarea>
  </div>

  <div class="card">
    <div class="label mb1">${t('difficulty')}</div>
    <div class="pills mt1">
      ${[['beginner',t('beginner')],['practitioner',t('practitioner')],['expert',t('expert')]].map(([id,label])=>
        `<div class="pill ${S.level===id?'active':''}" onclick="set('level','${id}')">${label}</div>`
      ).join('')}
    </div>
  </div>

  <div class="card">
    <div class="label mb1">${t('lessonLen')}</div>
    <div class="range-wrap">
      <div class="range-row">
        <span class="small muted">${S.duration<=15?t('short'):S.duration<=25?t('standard'):t('deep')}</span>
        <span class="range-val">${S.duration} min</span>
      </div>
      <input type="range" min="10" max="60" step="5" value="${S.duration}" oninput="liveRange(this.value)" />
    </div>
  </div>

  <button class="btn btn-accent w" style="padding:1rem;" onclick="doCreateCourse()">${t('generateCourse')}</button>
</div>
```

  </div>`;
}

// ═══════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════
function go(screen) { S.screen = screen; render(); }

function setLang(l) { S.lang = l; render(); }

function set(key, val) { S[key] = val; render(); }

function liveRange(v) {
S.duration = parseInt(v);
const lbl = document.getElementById(‘dur-label’);
const val = document.getElementById(‘dur-val’);
if(lbl) lbl.textContent = S.duration<=15?t(‘short’):S.duration<=25?t(‘standard’):S.duration<=40?t(‘deep’):t(‘immersive’);
if(val) val.textContent = v + ’ min’;
}

function quickLogin() {
const name = prompt(t(‘yourName’)) || ‘User’;
S.user = { name, email:’’, premium: false };
go(‘catalog’);
}

function doRegister() {
const name = document.getElementById(‘rname’).value.trim() || ‘User’;
const email = document.getElementById(‘remail’).value.trim();
S.user = { name, email, premium: false };
go(‘catalog’);
}

function selectCourse(id) {
S.selectedCourse = id;
S.completedModules = [];
S.moduleIndex = 0;
go(‘courseDetail’);
}

function togglePremium() {
// demo toggle
S.user.premium = !S.user.premium;
alert(S.user.premium ? ‘Premium включён (демо)’ : ‘Premium отключён (демо)’);
render();
}

function showPremiumPrompt() {
if(confirm(‘Premium открывает: все курсы, офлайн, AI-вопросы, создание курсов.\n\nВключить Premium (демо)?’)) {
S.user.premium = true;
render();
}
}

// ── PLACEMENT ──
async function startPlacement() {
S.placementQ = [];
S.placementStep = 0;
S.placementScore = 0;
go(‘placement’);

const c = getCourse();
const langNote = S.lang === ‘ru’ ? ‘Все вопросы на русском языке.’ : ‘All questions in English.’;
const prompt = `Create a placement test (4 questions, increasing difficulty) for the course: "${cTitle(c)}". ${langNote} Return ONLY valid JSON array, no markdown: [{"text":"Question text","options":["A","B","C","D"],"correct":0}] Rules: correct is index 0-3, plausible distractors, questions 1-2 basic level, questions 3-4 advanced.`;

try {
const r = await callAI(prompt, 800);
S.placementQ = JSON.parse(r.replace(/`json|`/g,’’).trim());
} catch(e) {
skipPlacement();
return;
}
render();
}

function answerPlacement(idx) {
if(idx === S.placementQ[S.placementStep].correct) S.placementScore++;
S.placementStep++;
if(S.placementStep >= S.placementQ.length) {
const s = S.placementScore, total = S.placementQ.length;
S.level = s <= Math.floor(total*.3) ? ‘beginner’ : s <= Math.floor(total*.7) ? ‘practitioner’ : ‘expert’;
beginCourse();
} else render();
}

function skipPlacement() { beginCourse(); }

// ── LESSON ENGINE ──
function beginCourse() {
const c = getCourse();
S.lessonIndex = 0;
S.lessonTotal = c.lessons;
S.lessonStep = 0;
S.lessonData = null;
S.completedModules = [];
go(‘lesson’);
generateLesson();
}

async function generateLesson() {
const c = getCourse();
const modules = cModules(c);
const modIdx = Math.min(Math.floor(S.lessonIndex / Math.ceil(S.lessonTotal / modules.length)), modules.length-1);
const modName = modules[modIdx];
const levelMap = { beginner: S.lang===‘ru’?‘новичок без специальных знаний’:‘beginner with no prior knowledge’, practitioner: S.lang===‘ru’?‘человек с базовыми знаниями’:‘someone with basic knowledge’, expert: S.lang===‘ru’?‘опытный специалист’:‘experienced specialist’ };
const goalMap  = { interest: S.lang===‘ru’?‘из интереса’:‘out of curiosity’, career: S.lang===‘ru’?‘для карьеры’:‘for career growth’, work: S.lang===‘ru’?‘для работы’:‘for work’ };
const langNote = S.lang === ‘ru’ ? ‘Весь текст на русском языке.’ : ‘All text in English.’;

// Check offline cache
const cacheKey = `${S.selectedCourse}_${S.lessonIndex}_${S.level}`;
if(S.offlineCache[cacheKey]) {
S.lessonData = S.offlineCache[cacheKey];
S.lessonStep = 1;
render();
return;
}

const prompt = `You are an expert educator. Create lesson ${S.lessonIndex+1} for course “${cTitle(c)}”, module “${modName}”.

User level: ${levelMap[S.level]}
Goal: ${goalMap[S.goal]}
Lesson length: ~${S.duration} minutes reading time
${langNote}

Return ONLY valid JSON (no markdown):
{
“title”: “Specific engaging lesson title”,
“body”: “HTML lesson content”,
“caseStudy”: “HTML case study (optional, null if not needed)”,
“question”: {
“text”: “Comprehension question”,
“options”: [“A”,“B”,“C”,“D”],
“correct”: 0,
“explanation”: “2-3 sentence explanation”
}
}

Body HTML rules:

- Use tags: p, h3, span class=hl, div class=example, code class=formula, div class=case-box with span class=case-label inside
- Depth matches ${S.duration} minutes
- Real examples with specific numbers
- Level: ${levelMap[S.level]}
- engaging, conversational tone — not textbook dry
- For caseStudy: practical scenario applying the lesson concepts (or null)`;
  
  try {
  const r = await callAI(prompt, 1000);
  const parsed = JSON.parse(r.replace(/`json|`/g,’’).trim());
  S.lessonData = parsed;
  S.offlineCache[cacheKey] = parsed; // cache for offline
  S.lessonStep = 1;
  } catch(e) {
  S.lessonData = {
  title: ‘Error loading lesson’,
  body: ‘<p>Could not load lesson. Please check your connection.</p>’,
  caseStudy: null,
  question: { text:‘Error’, options:[’—’,’—’,’—’,’—’], correct:0, explanation:’—’ }
  };
  S.lessonStep = 1;
  }
  render();
  }

function nextLessonStep(from) {
const d = S.lessonData;
if(from === 1) {
// from content: go to case if exists, else question
S.lessonStep = d?.caseStudy ? 2 : 3;
} else if(from === 2) {
S.lessonStep = 3;
}
render();
}

function prevStep() {
if(S.lessonStep > 1) S.lessonStep–;
render();
}

function answerLesson(idx) {
S.selectedAnswer = idx;
S.lastCorrect = idx === S.lessonData?.question?.correct;
S.xp += S.lastCorrect ? 30 : 10;
S.lessonStep = 4;
render();
setTimeout(loadAIFeedback, 80);
}

async function loadAIFeedback() {
const q = S.lessonData?.question;
if(!q) return;
const letters = [‘A’,‘B’,‘C’,‘D’];
const langNote = S.lang === ‘ru’ ? ‘Отвечай на русском языке.’ : ‘Reply in English.’;
const prompt = `You are an AI tutor. ${langNote} Reply in 2-3 sentences, no markdown. Question: "${q.text}" Correct answer: ${letters[q.correct]}. ${q.options[q.correct]} User chose: ${letters[S.selectedAnswer]}. ${q.options[S.selectedAnswer]} Result: ${S.lastCorrect ? 'CORRECT' : 'WRONG'} Official explanation: "${q.explanation}" User level: ${S.level} ${S.lastCorrect ? 'Confirm and add one interesting nuance.' : 'Explain the mistake supportively. Why is the correct answer right?'}`;

try {
const r = await callAI(prompt, 400);
const el = document.getElementById(‘ai-body’);
if(el) el.innerHTML = r;
S.aiMessages = [{role:‘assistant’,content:r}];
} catch(e) {
const el = document.getElementById(‘ai-body’);
if(el) el.innerHTML = q.explanation;
}
}

async function sendQ() {
const input = document.getElementById(‘ai-q’);
if(!input?.value.trim()) return;
const question = input.value.trim();
input.value = ‘’;
S.aiMessages.push({role:‘user’,content:question});

const bodyEl = document.getElementById(‘ai-body’);
if(bodyEl) bodyEl.innerHTML += `<br><br><span style="color:#6db38a;font-size:.82rem;">${S.lang==='ru'?'Вы':'You'}:</span> ${question}<br><div class="dots" style="margin-top:.4rem"><span></span><span></span><span></span></div>`;

const langNote = S.lang === ‘ru’ ? ‘Отвечай на русском.’ : ‘Reply in English.’;
const system = `AI tutor for "${cTitle(getCourse())}". Level: ${S.level}. ${langNote} 2-3 sentences, no markdown.`;

try {
const r = await callAI(question, 400, system, S.aiMessages.slice(0,-1));
S.aiMessages.push({role:‘assistant’,content:r});
if(bodyEl) {
const d = bodyEl.querySelector(’.dots’);
if(d) d.remove();
bodyEl.innerHTML += `<br><span style="color:#a8d5be;font-size:.82rem;">AI:</span> ${r}`;
}
} catch(e) {
if(bodyEl) { const d=bodyEl.querySelector(’.dots’); if(d) d.innerHTML=‘Connection error.’; }
}
}

function nextLesson() {
const c = getCourse();
const modules = cModules(c);
const newModIdx = Math.min(Math.floor(S.lessonIndex / Math.ceil(S.lessonTotal / modules.length)), modules.length-1);
if(!S.completedModules.includes(newModIdx)) S.completedModules.push(newModIdx);

S.lessonIndex++;
if(S.lessonIndex >= S.lessonTotal) { go(‘result’); return; }

S.lessonStep = 0;
S.lessonData = null;
S.aiMessages = [];
render();
generateLesson();
}

// ── CUSTOM COURSE ──
async function doCreateCourse() {
const title = document.getElementById(‘ctitle’)?.value.trim();
if(!title) { alert(S.lang===‘ru’?‘Введите название курса’:‘Please enter a course title’); return; }

const desc = document.getElementById(‘cdesc’)?.value.trim() || ‘’;
const customCourse = {
id: ‘custom_’ + Date.now(),
emoji: ‘◇’, tag: ‘Custom’,
title: { ru: title, en: title },
desc:  { ru: desc||title, en: desc||title },
modules: { ru: [‘Модуль 1’,‘Модуль 2’,‘Модуль 3’], en: [‘Module 1’,‘Module 2’,‘Module 3’] },
lessons: 6, hours: ‘2–4’, locked: false, premium: true,
};
COURSES.push(customCourse);
S.selectedCourse = customCourse.id;
S.completedModules = [];
go(‘settings’);
}

// ── AI HELPER ──
async function callAI(prompt, maxTokens=1000, system=null, history=[]) {
const messages = […history.map(m=>({role:m.role,content:m.content})), {role:‘user’,content:prompt}];
const body = { model:‘claude-sonnet-4-20250514’, max_tokens:maxTokens, messages };
if(system) body.system = system;
const r = await fetch(‘https://api.anthropic.com/v1/messages’, {
method:‘POST’,
headers:{‘Content-Type’:‘application/json’},
body:JSON.stringify(body)
});
const data = await r.json();
return data.content?.map(b=>b.type===‘text’?b.text:’’).join(’’) || ‘’;
}
