<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meridian — CFO Learning</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0f0e0c;
    --paper: #f5f2ec;
    --cream: #ede9e0;
    --gold: #c9a84c;
    --gold-light: #e8d5a0;
    --rust: #b84c2a;
    --sage: #4a6741;
    --muted: #7a7568;
    --border: #d4cfc4;
    --card: #faf8f4;
  }

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
font-family: ‘DM Sans’, sans-serif;
background: var(–paper);
color: var(–ink);
min-height: 100vh;
overflow-x: hidden;
}

/* TYPOGRAPHY */
.display { font-family: ‘Playfair Display’, serif; }
.mono { font-family: ‘DM Mono’, monospace; }

/* LAYOUT */
.screen {
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 2rem;
animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
from { opacity: 0; transform: translateY(12px); }
to { opacity: 1; transform: translateY(0); }
}

.container {
width: 100%;
max-width: 680px;
}

/* HEADER STRIPE */
.top-bar {
position: fixed;
top: 0; left: 0; right: 0;
height: 4px;
background: linear-gradient(90deg, var(–gold), var(–rust));
z-index: 100;
}

/* PROGRESS BAR */
.progress-track {
width: 100%;
height: 3px;
background: var(–border);
border-radius: 2px;
margin-bottom: 2.5rem;
overflow: hidden;
}
.progress-fill {
height: 100%;
background: linear-gradient(90deg, var(–gold), var(–rust));
border-radius: 2px;
transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
}

/* CARDS */
.card {
background: var(–card);
border: 1px solid var(–border);
border-radius: 2px;
padding: 2.5rem;
margin-bottom: 1.5rem;
position: relative;
}

.card::before {
content: ‘’;
position: absolute;
top: 0; left: 0;
width: 3px; height: 100%;
background: var(–gold);
border-radius: 2px 0 0 2px;
}

/* TAGS */
.tag {
font-family: ‘DM Mono’, monospace;
font-size: 0.7rem;
font-weight: 500;
letter-spacing: 0.12em;
text-transform: uppercase;
color: var(–muted);
margin-bottom: 0.75rem;
display: block;
}

/* BUTTONS */
.btn {
display: inline-flex;
align-items: center;
gap: 0.5rem;
padding: 0.85rem 1.75rem;
font-family: ‘DM Mono’, monospace;
font-size: 0.82rem;
letter-spacing: 0.06em;
font-weight: 500;
border: none;
cursor: pointer;
transition: all 0.2s ease;
border-radius: 1px;
text-transform: uppercase;
}

.btn-primary {
background: var(–ink);
color: var(–paper);
}
.btn-primary:hover {
background: #2a2820;
transform: translateY(-1px);
box-shadow: 0 6px 20px rgba(15,14,12,0.2);
}

.btn-ghost {
background: transparent;
color: var(–ink);
border: 1px solid var(–border);
}
.btn-ghost:hover {
border-color: var(–ink);
background: var(–cream);
}

.btn-gold {
background: var(–gold);
color: var(–ink);
}
.btn-gold:hover {
background: #b8933e;
transform: translateY(-1px);
box-shadow: 0 6px 20px rgba(201,168,76,0.3);
}

.btn-correct {
background: var(–sage);
color: white;
}
.btn-wrong {
background: var(–rust);
color: white;
}

/* OPTION BUTTONS */
.option-btn {
width: 100%;
text-align: left;
padding: 1rem 1.25rem;
background: var(–card);
border: 1px solid var(–border);
border-radius: 2px;
cursor: pointer;
font-family: ‘DM Sans’, sans-serif;
font-size: 0.95rem;
color: var(–ink);
transition: all 0.2s ease;
margin-bottom: 0.6rem;
display: flex;
align-items: center;
gap: 0.75rem;
}

.option-btn:hover:not(:disabled) {
border-color: var(–gold);
background: var(–cream);
transform: translateX(3px);
}

.option-btn.selected-correct {
border-color: var(–sage);
background: rgba(74,103,65,0.08);
color: var(–sage);
}

.option-btn.selected-wrong {
border-color: var(–rust);
background: rgba(184,76,42,0.08);
color: var(–rust);
}

.option-btn.reveal-correct {
border-color: var(–sage);
background: rgba(74,103,65,0.05);
color: var(–sage);
}

.option-letter {
font-family: ‘DM Mono’, monospace;
font-size: 0.75rem;
font-weight: 500;
width: 22px;
height: 22px;
border-radius: 50%;
border: 1px solid currentColor;
display: flex;
align-items: center;
justify-content: center;
flex-shrink: 0;
opacity: 0.6;
}

/* SLIDER */
.slider-group {
margin: 1.5rem 0;
}
.slider-label {
display: flex;
justify-content: space-between;
margin-bottom: 0.6rem;
font-size: 0.85rem;
color: var(–muted);
font-family: ‘DM Mono’, monospace;
}
.slider-value {
color: var(–ink);
font-weight: 500;
}
input[type=“range”] {
width: 100%;
-webkit-appearance: none;
height: 3px;
background: var(–border);
border-radius: 2px;
outline: none;
}
input[type=“range”]::-webkit-slider-thumb {
-webkit-appearance: none;
width: 18px;
height: 18px;
border-radius: 50%;
background: var(–ink);
cursor: pointer;
border: 3px solid var(–paper);
box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}

/* DIFFICULTY PILLS */
.pill-group {
display: flex;
gap: 0.5rem;
margin-top: 1rem;
}
.pill {
flex: 1;
padding: 0.6rem;
text-align: center;
border: 1px solid var(–border);
border-radius: 1px;
cursor: pointer;
font-family: ‘DM Mono’, monospace;
font-size: 0.75rem;
letter-spacing: 0.08em;
text-transform: uppercase;
color: var(–muted);
transition: all 0.2s ease;
background: var(–card);
}
.pill:hover { border-color: var(–gold); color: var(–ink); }
.pill.active {
background: var(–ink);
color: var(–paper);
border-color: var(–ink);
}

/* AI CHAT */
.ai-panel {
background: var(–ink);
color: var(–paper);
border-radius: 2px;
padding: 1.5rem;
margin-top: 1rem;
animation: slideUp 0.3s ease;
}

@keyframes slideUp {
from { opacity: 0; transform: translateY(8px); }
to { opacity: 1; transform: translateY(0); }
}

.ai-panel .tag { color: var(–gold); }

.ai-message {
font-size: 0.9rem;
line-height: 1.7;
color: #d4cfc4;
}

.ai-loading {
display: flex;
gap: 4px;
align-items: center;
padding: 0.5rem 0;
}
.ai-loading span {
width: 6px; height: 6px;
background: var(–gold);
border-radius: 50%;
animation: pulse 1.2s infinite;
}
.ai-loading span:nth-child(2) { animation-delay: 0.2s; }
.ai-loading span:nth-child(3) { animation-delay: 0.4s; }

@keyframes pulse {
0%, 60%, 100% { transform: scale(1); opacity: 0.5; }
30% { transform: scale(1.3); opacity: 1; }
}

.ai-input-row {
display: flex;
gap: 0.5rem;
margin-top: 1rem;
padding-top: 1rem;
border-top: 1px solid rgba(255,255,255,0.1);
}
.ai-input {
flex: 1;
background: rgba(255,255,255,0.07);
border: 1px solid rgba(255,255,255,0.15);
border-radius: 1px;
padding: 0.6rem 0.9rem;
color: var(–paper);
font-family: ‘DM Sans’, sans-serif;
font-size: 0.85rem;
outline: none;
}
.ai-input::placeholder { color: rgba(255,255,255,0.3); }
.ai-input:focus { border-color: var(–gold); }
.ai-send {
background: var(–gold);
color: var(–ink);
border: none;
padding: 0.6rem 1rem;
cursor: pointer;
border-radius: 1px;
font-family: ‘DM Mono’, monospace;
font-size: 0.75rem;
font-weight: 500;
transition: background 0.2s;
}
.ai-send:hover { background: #b8933e; }

/* RESULT BLOCK */
.result-icon {
font-size: 2.5rem;
margin-bottom: 1rem;
}
.score-display {
font-family: ‘Playfair Display’, serif;
font-size: 4rem;
line-height: 1;
margin: 1rem 0;
}

/* MODULE MAP */
.module-map {
display: flex;
flex-direction: column;
gap: 0.5rem;
margin: 1.5rem 0;
}
.module-item {
display: flex;
align-items: center;
gap: 1rem;
padding: 1rem 1.25rem;
background: var(–card);
border: 1px solid var(–border);
border-radius: 2px;
cursor: pointer;
transition: all 0.2s ease;
}
.module-item:hover:not(.locked) { border-color: var(–gold); transform: translateX(4px); }
.module-item.locked { opacity: 0.45; cursor: default; }
.module-item.completed { border-color: var(–sage); }
.module-num {
font-family: ‘DM Mono’, monospace;
font-size: 0.75rem;
font-weight: 500;
width: 32px; height: 32px;
border-radius: 50%;
border: 1px solid var(–border);
display: flex;
align-items: center;
justify-content: center;
flex-shrink: 0;
color: var(–muted);
}
.module-item.completed .module-num {
background: var(–sage);
color: white;
border-color: var(–sage);
}
.module-title { font-weight: 500; font-size: 0.95rem; }
.module-sub { font-size: 0.8rem; color: var(–muted); margin-top: 0.15rem; }

/* LESSON CONTENT */
.lesson-body {
font-size: 1rem;
line-height: 1.8;
color: #2a2820;
}
.lesson-body h3 {
font-family: ‘Playfair Display’, serif;
font-size: 1.15rem;
margin: 1.5rem 0 0.5rem;
color: var(–ink);
}
.lesson-body p { margin-bottom: 0.75rem; }
.lesson-body .highlight {
background: var(–gold-light);
padding: 0.15rem 0.4rem;
border-radius: 2px;
font-weight: 500;
}
.lesson-body .example-box {
background: var(–cream);
border-left: 3px solid var(–gold);
padding: 1rem 1.25rem;
margin: 1rem 0;
border-radius: 0 2px 2px 0;
font-size: 0.9rem;
}
.lesson-body .formula {
font-family: ‘DM Mono’, monospace;
font-size: 0.9rem;
background: var(–ink);
color: var(–gold);
padding: 0.75rem 1rem;
border-radius: 2px;
margin: 1rem 0;
display: block;
}

/* MISC */
.divider {
width: 40px;
height: 2px;
background: var(–gold);
margin: 1rem 0;
}

.stats-row {
display: flex;
gap: 1.5rem;
margin: 1.5rem 0;
}
.stat {
text-align: center;
}
.stat-num {
font-family: ‘Playfair Display’, serif;
font-size: 1.8rem;
line-height: 1;
}
.stat-label {
font-family: ‘DM Mono’, monospace;
font-size: 0.7rem;
color: var(–muted);
letter-spacing: 0.1em;
text-transform: uppercase;
margin-top: 0.25rem;
}

.xp-badge {
display: inline-flex;
align-items: center;
gap: 0.35rem;
background: var(–gold-light);
color: #7a5a1a;
padding: 0.3rem 0.7rem;
border-radius: 20px;
font-family: ‘DM Mono’, monospace;
font-size: 0.75rem;
font-weight: 500;
}

.hidden { display: none; }

/* RESPONSIVE */
@media (max-width: 600px) {
.screen { padding: 1rem; }
.card { padding: 1.5rem; }
.score-display { font-size: 3rem; }
}
</style>

</head>

<script>
// ============================================================
// STATE
// ============================================================
const state = {
  screen: 'welcome',       // welcome | placement | settings | course-map | lesson | result | complete
  placementScore: 0,
  placementAnswers: [],
  level: 'practitioner',  // beginner | practitioner | expert
  duration: 30,           // minutes
  xp: 0,
  completedModules: [],
  currentModule: 0,
  currentLesson: null,
  lessonStep: 0,          // 0=content, 1=question, 2=feedback
  questionAnswered: false,
  lastAnswerCorrect: false,
  aiMessages: [],
  aiLoading: false,
  placementStep: 0,
};

// ============================================================
// CONTENT
// ============================================================

const PLACEMENT_QUESTIONS = [
  {
    q: "Что такое EBITDA?",
    options: [
      "Прибыль до вычета налогов",
      "Прибыль до вычета процентов, налогов, износа и амортизации",
      "Выручка минус себестоимость",
      "Чистая прибыль компании"
    ],
    correct: 1
  },
  {
    q: "Компания имеет актив стоимостью $1M, который финансируется на 60% долгом. Каков собственный капитал?",
    options: ["$600K", "$400K", "$1M", "$1.6M"],
    correct: 1
  },
  {
    q: "Что измеряет коэффициент P/E?",
    options: [
      "Рентабельность продаж",
      "Долговую нагрузку компании",
      "Сколько инвесторы платят за $1 прибыли",
      "Операционный денежный поток"
    ],
    correct: 2
  },
  {
    q: "Что происходит с NPV проекта при росте ставки дисконтирования?",
    options: [
      "NPV растёт",
      "NPV не меняется",
      "NPV падает",
      "Зависит от типа проекта"
    ],
    correct: 2
  },
  {
    q: "Компания генерирует $2M выручки, $800K EBITDA, $200K амортизации, $150K процентов. Какова EBIT?",
    options: ["$800K", "$650K", "$600K", "$450K"],
    correct: 2
  }
];

const MODULES = [
  {
    id: 0,
    title: "Финансовая отчётность",
    sub: "P&L, баланс, cash flow — как это читать",
    lessons: [
      {
        title: "Три кита финансов: отчётность как система",
        tag: "Концепция",
        content: {
          beginner: `<p>Финансовая отчётность — это три документа, которые вместе рассказывают полную историю о компании. Представьте их как медицинские анализы: каждый показывает что-то своё, но диагноз ставится по всем трём вместе.</p>
          <h3>Отчёт о прибылях и убытках (P&L)</h3>
          <p>Отвечает на вопрос: <span class="highlight">зарабатывает ли компания деньги?</span> Он показывает выручку, расходы и итоговую прибыль за период — например, за квартал или год.</p>
          <div class="example-box">Аналогия: P&L — это как ваша зарплатная квитанция. Получили 100, потратили 70 на жизнь — осталось 30. Прибыль есть.</div>
          <h3>Баланс (Balance Sheet)</h3>
          <p>Отвечает на вопрос: <span class="highlight">что у компании есть и откуда это взялось?</span> Левая сторона — активы (всё, чем владеет компания). Правая — пассивы (долги) и собственный капитал (деньги акционеров).</p>
          <code class="formula">Активы = Обязательства + Собственный капитал</code>
          <h3>Отчёт о движении денежных средств (Cash Flow)</h3>
          <p>Отвечает на вопрос: <span class="highlight">где физически находятся деньги?</span> Компания может показывать бухгалтерскую прибыль, но быть пустой — именно cash flow показывает реальность.</p>`,

          practitioner: `<p>Три формы отчётности — не просто документы для налоговой. Это система взаимосвязанных показателей, где каждая цифра влияет на другие формы. CFO читает их не последовательно, а одновременно.</p>
          <h3>P&L: от выручки до чистой прибыли</h3>
          <p>Ключевой принцип — <span class="highlight">метод начисления (accrual basis)</span>: выручка признаётся при отгрузке, а не при получении денег. Это создаёт разрыв между P&L и реальным cash flow.</p>
          <code class="formula">Выручка → Валовая прибыль → EBITDA → EBIT → EBT → Чистая прибыль</code>
          <div class="example-box"><strong>Пример:</strong> Компания продала товар в декабре на $500K, деньги придут в феврале. В P&L декабря — выручка $500K. В cash flow декабря — ноль. Баланс покажет дебиторскую задолженность $500K.</div>
          <h3>Баланс: момент времени vs. период</h3>
          <p>В отличие от P&L (который показывает период), баланс — это <span class="highlight">снимок на конкретную дату</span>. Именно поэтому компании умеют "украшать" балансовую дату, временно закрывая долги.</p>
          <h3>Cash Flow: три секции</h3>
          <p>Операционный CF (OCF) — главный индикатор здоровья. Инвестиционный — CapEx и M&A. Финансовый — дивиденды, кредиты, buybacks. <span class="highlight">Хроническое расхождение OCF и прибыли — красный флаг.</span></p>`,

          expert: `<p>Понимание трёх форм отчётности на уровне CFO — это не чтение цифр, а понимание учётных политик, которые их формируют. Две компании с одинаковой экономикой могут показывать принципиально разные результаты.</p>
          <h3>Учётная политика как инструмент</h3>
          <p>P&L формируется через <span class="highlight">суждения менеджмента</span>: срок полезного использования активов, метод списания запасов (FIFO vs LIFO vs weighted average), признание выручки по IFRS 15 / ASC 606, оценка резервов.</p>
          <div class="example-box"><strong>Кейс:</strong> Две SaaS-компании с идентичными контрактами. Компания А признаёт выручку ежемесячно (ratable). Компания Б — при go-live клиента. При росте 50% YoY разница в выручке за год может составить 20-30%. P&L несопоставимы без нормализации.</div>
          <h3>Reconciliation как главный навык</h3>
          <code class="formula">Net Income → +DA → ±Working Capital changes → OCF</code>
          <p>Ключ к чтению отчётности — <span class="highlight">reconciliation чистой прибыли к OCF</span>. Аномалии здесь (особенно рост receivables при росте выручки, раздувание запасов, изменение payables) — первые признаки качества прибыли.</p>
          <h3>Off-balance sheet риски</h3>
          <p>После IFRS 16 операционный лизинг вошёл в баланс, но остались: contingent liabilities, unfunded pension obligations, take-or-pay контракты, SPV. CFO обязан знать полное экономическое обязательство, а не только бухгалтерское.</p>`
        },
        question: {
          beginner: {
            text: "Компания отгрузила товар клиенту 31 декабря на сумму $200K. Оплата придёт 15 января. Где эта операция отразится в отчётности за декабрь?",
            options: [
              "Только в Cash Flow — деньги поступят в январе",
              "В P&L как выручка $200K, в балансе как дебиторская задолженность $200K",
              "В P&L как выручка $200K и в Cash Flow как приход $200K",
              "Нигде — операция завершится только в январе"
            ],
            correct: 1,
            explanation: "Метод начисления (accrual basis): выручка признаётся в момент отгрузки, независимо от оплаты. В P&L — выручка $200K. В балансе — дебиторка $200K (актив, деньги которые должны прийти). В Cash Flow — ноль, деньги физически не поступили."
          },
          practitioner: {
            text: "OCF компании за год составил $50M, чистая прибыль — $80M. Дебиторская задолженность выросла на $40M, запасы упали на $15M, кредиторская задолженность выросла на $5M. Какой вывод наиболее вероятен?",
            options: [
              "Компания эффективно управляет оборотным капиталом",
              "Компания агрессивно признаёт выручку — возможны проблемы с качеством прибыли",
              "Компания сократила операционные расходы",
              "Разрыв OCF/NI нормален для растущего бизнеса"
            ],
            correct: 1,
            explanation: "Разрыв OCF ($50M) vs Net Income ($80M) = -$30M. Рост дебиторки на $40M при росте выручки — классический признак агрессивного признания выручки или проблем с собираемостью. Снижение запасов и рост payables частично компенсируют, но не объясняют масштаб разрыва. Red flag для аудитора."
          },
          expert: {

        </p>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;margin-bottom:2.5rem;">
        <div style="text-align:center;padding:1rem;background:var(--cream);border-radius:2px;">
          <div class="display" style="font-size:1.8rem;">3</div>
          <div class="mono" style="font-size:0.7rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-top:0.25rem;">модуля</div>
        </div>
        <div style="text-align:center;padding:1rem;background:var(--cream);border-radius:2px;">
          <div class="display" style="font-size:1.8rem;">AI</div>
          <div class="mono" style="font-size:0.7rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-top:0.25rem;">репетитор</div>
        </div>
        <div style="text-align:center;padding:1rem;background:var(--cream);border-radius:2px;">
          <div class="display" style="font-size:1.8rem;">3</div>
          <div class="mono" style="font-size:0.7rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-top:0.25rem;">уровня</div>
        </div>
      </div>

      <button class="btn btn-primary" onclick="startPlacement()" style="width:100%;justify-content:center;font-size:0.85rem;padding:1rem;">
        Начать — пройти тест на уровень →
      </button>
      <button class="btn btn-ghost" onclick="skipToSettings()" style="width:100%;justify-content:center;margin-top:0.75rem;font-size:0.8rem;">
        Пропустить тест
      </button>
    </div>
  </div>`;
}

function renderPlacement() {
  const q = PLACEMENT_QUESTIONS[state.placementStep];
  const progress = ((state.placementStep) / PLACEMENT_QUESTIONS.length) * 100;
  const letters = ['A','B','C','D'];

  return `
  <div class="screen">
    <div class="container">
      <div class="progress-track"><div class="progress-fill" style="width:${progress}%"></div></div>
      <span class="tag">Тест на уровень · Вопрос ${state.placementStep + 1} из ${PLACEMENT_QUESTIONS.length}</span>
      <h2 class="display" style="font-size:1.5rem;line-height:1.4;margin:0.75rem 0 2rem;">${q.q}</h2>
      <div>
        ${q.options.map((opt, i) => `
          <button class="option-btn" onclick="answerPlacement(${i})">
            <span class="option-letter">${letters[i]}</span>
            ${opt}
          </button>
        `).join('')}
      </div>
    </div>
  </div>`;
}

function renderSettings() {
  const levelLabels = { beginner: 'Новичок', practitioner: 'Практик', expert: 'Эксперт' };
  const durationLabel = state.duration <= 15 ? 'Короткий урок' : state.duration <= 30 ? 'Стандартный' : 'Глубокое погружение';

  return `
  <div class="screen">
    <div class="container">
      <span class="tag">Настройки курса</span>
      <h2 class="display" style="font-size:2rem;margin:0.5rem 0 0.5rem;">Настройте под себя</h2>
      <p style="color:var(--muted);margin-bottom:2rem;font-size:0.9rem;">
        ${state.screen === 'settings' && state.placementScore !== undefined ?
          `Ваш результат теста: ${state.placementScore} из ${PLACEMENT_QUESTIONS.length}` : ''}
      </p>

      <div class="card">
        <span class="tag">Уровень сложности</span>
        <p style="font-size:0.9rem;color:var(--muted);margin-bottom:1rem;">Определяет глубину объяснений и сложность вопросов</p>
        <div class="pill-group">
          <div class="pill ${state.level === 'beginner' ? 'active' : ''}" onclick="setLevel('beginner')">Новичок</div>
          <div class="pill ${state.level === 'practitioner' ? 'active' : ''}" onclick="setLevel('practitioner')">Практик</div>
          <div class="pill ${state.level === 'expert' ? 'active' : ''}" onclick="setLevel('expert')">Эксперт</div>
        </div>
      </div>

      <div class="card">
        <span class="tag">Длина урока</span>
        <div class="slider-group">
          <div class="slider-label">
            <span>${durationLabel}</span>
            <span class="slider-value">${state.duration} мин</span>
          </div>
          <input type="range" min="10" max="60" step="5" value="${state.duration}"
            oninput="setDuration(this.value)" />
          <div style="display:flex;justify-content:space-between;margin-top:0.4rem;">
            <span style="font-size:0.75rem;color:var(--muted);font-family:'DM Mono',monospace;">10 мин</span>
            <span style="font-size:0.75rem;color:var(--muted);font-family:'DM Mono',monospace;">60 мин</span>
          </div>
        </div>
      </div>

      <button class="btn btn-primary" onclick="goToCourseMap()" style="width:100%;justify-content:center;padding:1rem;">
        Начать курс →
      </button>
    </div>
  </div>`;
}

function renderCourseMap() {
  return `
  <div class="screen">
    <div class="container">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;">
        <div>
          <span class="tag">CFO Course · ${['Новичок','Практик','Эксперт'][['beginner','practitioner','expert'].indexOf(state.level)]}</span>
          <h2 class="display" style="font-size:1.75rem;margin-top:0.25rem;">Программа курса</h2>
        </div>
        <div class="xp-badge">⚡ ${state.xp} XP</div>
      </div>

      <div class="module-map">
        ${MODULES.map((mod, mi) => {
          const isCompleted = state.completedModules.includes(mi);
          const isLocked = mi > 0 && !state.completedModules.includes(mi - 1);
          return `
          <div class="module-item ${isCompleted ? 'completed' : ''} ${isLocked ? 'locked' : ''}"
               onclick="${!isLocked ? `startModule(${mi})` : ''}">
            <div class="module-num">${isCompleted ? '✓' : mi + 1}</div>
            <div>
              <div class="module-title">${mod.title}</div>
              <div class="module-sub">${mod.sub}</div>
            </div>
            <div style="margin-left:auto;color:var(--muted);font-size:0.75rem;font-family:'DM Mono',monospace;">
              ${isLocked ? '🔒' : isCompleted ? '' : `${mod.lessons.length} урока →`}
            </div>
          </div>`;
        }).join('')}
      </div>

      <button class="btn btn-ghost" onclick="goToSettings()" style="margin-top:1rem;font-size:0.8rem;">
        ⚙ Настройки курса
      </button>
    </div>
  </div>`;
}

function renderLesson() {
  const mod = MODULES[state.currentModule];
  const lesson = mod.lessons[state.currentLesson];
  const lvl = state.level;
  const progress = ((state.currentLesson + (state.lessonStep / 3)) / mod.lessons.length) * 100;

  if (state.lessonStep === 0) {
    return `
    <div class="screen" style="justify-content:flex-start;padding-top:5rem;">
      <div class="container">
        <div class="progress-track"><div class="progress-fill" style="width:${progress}%"></div></div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
          <button class="btn btn-ghost" onclick="goToCourseMap()" style="padding:0.5rem 0.75rem;font-size:0.75rem;">← Назад</button>
          <span class="xp-badge">⚡ ${state.xp} XP</span>
        </div>

        <span class="tag">${mod.title} · ${lesson.tag}</span>
        <h2 class="display" style="font-size:1.6rem;line-height:1.3;margin:0.5rem 0 2rem;">${lesson.title}</h2>

        <div class="card">
          <div class="lesson-body">${lesson.content[lvl]}</div>
        </div>

        <button class="btn btn-primary" onclick="nextStep()" style="width:100%;justify-content:center;padding:1rem;margin-top:0.5rem;">
          К вопросу →
        </button>
      </div>
    </div>`;
  }

  if (state.lessonStep === 1 || state.lessonStep === 2) {
    const q = lesson.question[lvl];
    const letters = ['A','B','C','D'];
    const answered = state.lessonStep === 2;

    return `
    <div class="screen" style="justify-content:flex-start;padding-top:5rem;">
      <div class="container">
        <div class="progress-track"><div class="progress-fill" style="width:${progress + 30}%"></div></div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
          <button class="btn btn-ghost" onclick="prevStep()" style="padding:0.5rem 0.75rem;font-size:0.75rem;">← Теория</button>
          <span class="xp-badge">⚡ ${state.xp} XP</span>
        </div>

        <span class="tag">Проверь себя</span>
        <h2 class="display" style="font-size:1.3rem;line-height:1.4;margin:0.5rem 0 1.5rem;">${q.text}</h2>

        <div id="options">
          ${q.options.map((opt, i) => {
            let cls = '';
            if (answered) {
              if (i === q.correct) cls = 'reveal-correct';
              else if (i === state.selectedAnswer && i !== q.correct) cls = 'selected-wrong';
            }
            return `<button class="option-btn ${cls}" onclick="answerQuestion(${i})" ${answered ? 'disabled' : ''}>
              <span class="option-letter">${letters[i]}</span>${opt}
            </button>`;
          }).join('')}
        </div>

        ${answered ? `
        <div class="ai-panel" id="ai-panel">
          <span class="tag">AI Репетитор</span>
          <div class="ai-message" id="ai-message">
            <div class="ai-loading"><span></span><span></span><span></span></div>
          </div>
          <div class="ai-input-row">
            <input class="ai-input" id="ai-follow-up" placeholder="Задайте уточняющий вопрос..." onkeydown="if(event.key==='Enter')sendFollowUp()" />
            <button class="ai-send" onclick="sendFollowUp()">→</button>
          </div>
        </div>

        <button class="btn ${state.lastAnswerCorrect ? 'btn-correct' : 'btn-gold'}"
                onclick="finishLesson()" style="width:100%;justify-content:center;padding:1rem;margin-top:1rem;">
          ${state.currentLesson < mod.lessons.length - 1 ? 'Следующий урок →' : 'Завершить модуль →'}
        </button>
        ` : ''}
      </div>
    </div>`;
  }
}

function renderResult() {
  const mod = MODULES[state.currentModule];
  return `
  <div class="screen">
    <div class="container" style="text-align:center;">
      <div class="result-icon">${state.lastAnswerCorrect ? '🎯' : '📖'}</div>
      <span class="tag" style="display:block;text-align:center;">Модуль завершён</span>
      <h2 class="display" style="font-size:2rem;margin:0.5rem 0;">${mod.title}</h2>
      <div class="divider" style="margin:1rem auto;"></div>

      <div class="stats-row" style="justify-content:center;">
        <div class="stat">
          <div class="stat-num">+${state.xp > 0 ? Math.min(state.xp, 50) : 25} XP</div>
          <div class="stat-label">Получено</div>
        </div>
        <div class="stat">
          <div class="stat-num">${state.currentModule + 1}/${MODULES.length}</div>
          <div class="stat-label">Прогресс</div>
        </div>
      </div>

      <button class="btn btn-primary" onclick="goToCourseMap()" style="width:100%;justify-content:center;padding:1rem;margin-top:2rem;">
        К курсу →
      </button>
    </div>
  </div>`;
}

// ============================================================
// HANDLERS
// ============================================================

function attachHandlers() {}

function startPlacement() {
  state.screen = 'placement';
  state.placementStep = 0;
  state.placementScore = 0;
  render();
}

function answerPlacement(idx) {
  const q = PLACEMENT_QUESTIONS[state.placementStep];
  if (idx === q.correct) state.placementScore++;
  state.placementStep++;
  if (state.placementStep >= PLACEMENT_QUESTIONS.length) {
    // Determine level
    if (state.placementScore <= 1) state.level = 'beginner';
    else if (state.placementScore <= 3) state.level = 'practitioner';
    else state.level = 'expert';
    state.screen = 'settings';
  }
  render();
}

function skipToSettings() {
  state.screen = 'settings';
  render();
}

function setLevel(lvl) {
  state.level = lvl;
  render();
}

function setDuration(val) {
  state.duration = parseInt(val);
  // Update label live
  const label = document.querySelector('.slider-label span:first-child');
  if (label) {
    label.textContent = val <= 15 ? 'Короткий урок' : val <= 30 ? 'Стандартный' : 'Глубокое погружение';
  }
  const valueEl = document.querySelector('.slider-value');
  if (valueEl) valueEl.textContent = val + ' мин';
}

function goToCourseMap() {
  state.screen = 'course-map';
  render();
}

function goToSettings() {
  state.screen = 'settings';
  render();
}

function startModule(moduleIdx) {
  state.currentModule = moduleIdx;
  state.currentLesson = 0;
  state.lessonStep = 0;
  state.screen = 'lesson';
  state.aiMessages = [];
  render();
}

function nextStep() {
  state.lessonStep = 1;
  render();
}

function prevStep() {
  state.lessonStep = 0;
  render();
}

function answerQuestion(idx) {
  if (state.lessonStep === 2) return;
  state.selectedAnswer = idx;
  const lesson = MODULES[state.currentModule].lessons[state.currentLesson];
  const q = lesson.question[state.level];
  state.lastAnswerCorrect = idx === q.correct;
  state.lessonStep = 2;
  if (state.lastAnswerCorrect) state.xp += 25;
  else state.xp += 10;
  render();

  // Trigger AI explanation
  setTimeout(() => loadAIExplanation(q, idx), 100);
}

async function loadAIExplanation(q, selectedIdx) {
  const letters = ['A','B','C','D'];
  const correct = state.lastAnswerCorrect;
  const lesson = MODULES[state.currentModule].lessons[state.currentLesson];
  const levelLabel = { beginner: 'новичка', practitioner: 'практика', expert: 'эксперта' }[state.level];

  const prompt = `Ты AI-репетитор по финансам для CFO-курса. 
Вопрос: "${q.text}"
Правильный ответ: ${letters[q.correct]}. ${q.options[q.correct]}
Пользователь выбрал: ${letters[selectedIdx]}. ${q.options[selectedIdx]}
Результат: ${correct ? 'ВЕРНО' : 'НЕВЕРНО'}

Объяснение из курса: "${q.explanation}"

Напиши краткое объяснение (3-4 предложения) для уровня ${levelLabel}. 
${correct ? 'Подтверди правильность и добавь одну важную деталь.' : 'Объясни почему выбранный ответ неверен и почему правильный — правильный.'}
Пиши на русском, без markdown форматирования, живым языком.`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });
    const data = await response.json();
    const text = data.content?.[0]?.text || q.explanation;

    const el = document.getElementById('ai-message');
    if (el) {
      el.innerHTML = text;
      state.aiMessages = [{ role: 'assistant', content: text }];
    }
  } catch (e) {
    const el = document.getElementById('ai-message');
    if (el) el.innerHTML = q.explanation;
  }
}

async function sendFollowUp() {
  const input = document.getElementById('ai-follow-up');
  if (!input || !input.value.trim()) return;
  const question = input.value.trim();
  input.value = '';

  const lesson = MODULES[state.currentModule].lessons[state.currentLesson];
  const q = lesson.question[state.level];
  const levelLabel = { beginner: 'новичка', practitioner: 'практика', expert: 'эксперта' }[state.level];

  state.aiMessages.push({ role: 'user', content: question });

  const msgEl = document.getElementById('ai-message');
  if (msgEl) {
    msgEl.innerHTML += `<br><br><strong style="color:var(--gold)">Вы:</strong> ${question}<br><div class="ai-loading" style="margin-top:0.5rem"><span></span><span></span><span></span></div>`;
  }

  const systemPrompt = `Ты AI-репетитор по финансам для CFO-курса. Тема урока: "${lesson.title}". Уровень пользователя: ${levelLabel}. Отвечай кратко (2-4 предложения), на русском, без markdown.`;

  try {
    const messages = [
      { role: 'user', content: `Контекст урока: "${lesson.title}". Вопрос теста: "${q.text}". Правильный ответ: ${q.options[q.correct]}` },
      ...state.aiMessages
    ];

    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: systemPrompt,
        messages
      })
    });
    const data = await response.json();
    const text = data.content?.[0]?.text || "Не удалось получить ответ.";
    state.aiMessages.push({ role: 'assistant', content: text });

    if (msgEl) {
      // Remove loading
      const loading = msgEl.querySelector('.ai-loading');
      if (loading) loading.remove();
      msgEl.innerHTML += `<br><strong style="color:var(--gold-light)">AI:</strong> ${text}`;
    }
  } catch (e) {
    if (msgEl) {
      const loading = msgEl.querySelector('.ai-loading');
      if (loading) loading.remove();
      msgEl.innerHTML += `<br>Ошибка соединения.`;
    }
  }
}

function finishLesson() {
  const mod = MODULES[state.currentModule];
  if (state.currentLesson < mod.lessons.length - 1) {
    state.currentLesson++;
    state.lessonStep = 0;
    state.aiMessages = [];
    state.screen = 'lesson';
    render();
  } else {
    if (!state.completedModules.includes(state.currentModule)) {
      state.completedModules.push(state.currentModule);
    }
    state.screen = 'result';
    render();
  }
}

// ============================================================
// INIT
// ============================================================
render();
</script>

</body>
</html>
