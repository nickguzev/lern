<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lern</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ─────────────────────────────────────────── */
:root {
  --bg:       #f7f5f0;
  --surface:  #ffffff;
  --surface2: #f0ede6;
  --border:   #e4e0d8;
  --border2:  #ccc8be;
  --ink:      #1a1814;
  --ink2:     #4a4740;
  --muted:    #8a8680;
  --accent:   #2d5be3;
  --accent-s: rgba(45,91,227,0.08);
  --green:    #1a7a4a;
  --green-s:  rgba(26,122,74,0.08);
  --red:      #c0392b;
  --red-s:    rgba(192,57,43,0.08);
  --amber:    #b8860b;
  --r: 10px;
  --r-sm: 6px;
}

/* ── RESET ───────────────────────────────────────────── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
font-family: ‘Manrope’, sans-serif;
background: var(–bg);
color: var(–ink);
min-height: 100vh;
-webkit-font-smoothing: antialiased;
}

/* ── SCREENS ─────────────────────────────────────────── */
.screen {
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
padding: 0 1.25rem 3rem;
animation: rise .35s cubic-bezier(.4,0,.2,1) both;
}
@keyframes rise {
from { opacity:0; transform:translateY(10px); }
to   { opacity:1; transform:translateY(0); }
}
.wrap { width: 100%; max-width: 600px; }

/* ── TOPBAR ──────────────────────────────────────────── */
.topbar {
width: 100%;
display: flex;
align-items: center;
justify-content: space-between;
padding: 1.1rem 0;
margin-bottom: 0.5rem;
}
.logo {
font-family: ‘Instrument Serif’, serif;
font-size: 1.5rem;
letter-spacing: -0.01em;
color: var(–ink);
}
.topbar-right { display:flex; align-items:center; gap:0.75rem; }

/* ── TYPOGRAPHY ──────────────────────────────────────── */
.serif { font-family: ‘Instrument Serif’, serif; }
.mono  { font-family: ‘JetBrains Mono’, monospace; }

.eyebrow {
font-size: 0.7rem;
font-weight: 600;
letter-spacing: 0.12em;
text-transform: uppercase;
color: var(–muted);
display: block;
margin-bottom: 0.5rem;
}
.eyebrow-accent { color: var(–accent); }

h1.display {
font-family: ‘Instrument Serif’, serif;
font-size: clamp(2rem, 5vw, 2.8rem);
line-height: 1.12;
letter-spacing: -0.02em;
color: var(–ink);
}
h2.title {
font-family: ‘Instrument Serif’, serif;
font-size: clamp(1.5rem, 4vw, 2rem);
line-height: 1.2;
letter-spacing: -0.01em;
}
.body-text {
font-size: 0.95rem;
line-height: 1.7;
color: var(–ink2);
}

/* ── DIVIDER ─────────────────────────────────────────── */
.divider { height:1px; background:var(–border); margin: 1.5rem 0; }

/* ── BUTTONS ─────────────────────────────────────────── */
.btn {
display: inline-flex; align-items:center; justify-content:center; gap:0.4rem;
padding: 0.8rem 1.5rem;
font-family: ‘Manrope’, sans-serif;
font-size: 0.875rem;
font-weight: 600;
border: none;
border-radius: var(–r-sm);
cursor: pointer;
transition: all .18s ease;
white-space: nowrap;
}
.btn-primary { background:var(–ink); color:#fff; }
.btn-primary:hover { background:#2d2a24; transform:translateY(-1px); box-shadow:0 4px 16px rgba(26,24,20,.18); }
.btn-accent  { background:var(–accent); color:#fff; }
.btn-accent:hover  { opacity:.9; transform:translateY(-1px); }
.btn-ghost   { background:transparent; color:var(–ink2); border:1px solid var(–border2); }
.btn-ghost:hover   { border-color:var(–ink); color:var(–ink); background:var(–surface2); }
.btn-surface { background:var(–surface); color:var(–ink); border:1px solid var(–border); }
.btn-surface:hover { border-color:var(–border2); background:var(–surface2); }
.btn-danger  { background:var(–red-s); color:var(–red); border:1px solid rgba(192,57,43,.2); }
.btn-success { background:var(–green-s); color:var(–green); border:1px solid rgba(26,122,74,.2); }
.btn-full { width:100%; }
.btn-lg { padding:1rem 1.75rem; font-size:0.95rem; }
.btn-sm { padding:0.5rem 0.875rem; font-size:0.8rem; }

/* ── INPUT ───────────────────────────────────────────── */
.field { margin-bottom:1rem; }
.field label { display:block; font-size:0.8rem; font-weight:600; color:var(–ink2); margin-bottom:0.4rem; }
.input {
width:100%;
background:var(–surface);
border:1px solid var(–border);
border-radius:var(–r-sm);
padding: 0.8rem 1rem;
font-family:‘Manrope’,sans-serif;
font-size:0.9rem;
color:var(–ink);
outline:none;
transition: border-color .18s;
}
.input:focus { border-color:var(–accent); box-shadow:0 0 0 3px var(–accent-s); }
.input::placeholder { color:var(–muted); }
select.input { cursor:pointer; }

/* ── CARD ────────────────────────────────────────────── */
.card {
background:var(–surface);
border:1px solid var(–border);
border-radius:var(–r);
padding:1.5rem;
margin-bottom:0.75rem;
}

/* ── PILL / TAG ──────────────────────────────────────── */
.tag {
display:inline-flex; align-items:center; gap:0.3rem;
padding:0.25rem 0.65rem;
border-radius:100px;
font-size:0.72rem;
font-weight:600;
letter-spacing:0.04em;
border:1px solid var(–border);
color:var(–muted);
background:var(–surface2);
}
.tag-accent { border-color:rgba(45,91,227,.25); color:var(–accent); background:var(–accent-s); }
.tag-green  { border-color:rgba(26,122,74,.25);  color:var(–green);  background:var(–green-s); }
.tag-amber  { border-color:rgba(184,134,11,.25); color:var(–amber);  background:rgba(184,134,11,.07); }

/* ── PILLS GROUP ─────────────────────────────────────── */
.pills { display:flex; flex-wrap:wrap; gap:0.5rem; }
.pill {
padding:0.45rem 1rem;
border-radius:100px;
border:1px solid var(–border);
font-size:0.82rem; font-weight:600;
cursor:pointer; color:var(–ink2);
background:var(–surface);
transition: all .18s;
}
.pill:hover { border-color:var(–border2); color:var(–ink); }
.pill.on { background:var(–ink); color:#fff; border-color:var(–ink); }

/* ── PROGRESS BAR ────────────────────────────────────── */
.pbar { height:3px; background:var(–border); border-radius:2px; overflow:hidden; margin-bottom:2rem; }
.pbar-fill { height:100%; background:var(–accent); border-radius:2px; transition:width .5s cubic-bezier(.4,0,.2,1); }

/* ── STREAK ──────────────────────────────────────────── */
.streak-badge {
display:flex; align-items:center; gap:0.35rem;
font-size:0.8rem; font-weight:700; color:var(–amber);
background:rgba(184,134,11,.1);
border:1px solid rgba(184,134,11,.2);
border-radius:100px;
padding:0.3rem 0.7rem;
}

/* ── XP ──────────────────────────────────────────────── */
.xp-badge {
display:flex; align-items:center; gap:0.3rem;
font-size:0.8rem; font-weight:700; color:var(–accent);
background:var(–accent-s);
border:1px solid rgba(45,91,227,.2);
border-radius:100px;
padding:0.3rem 0.7rem;
}

/* ── OPTIONS ─────────────────────────────────────────── */
.option {
width:100%; text-align:left;
background:var(–surface); border:1px solid var(–border);
border-radius:var(–r-sm);
padding:0.9rem 1.1rem;
margin-bottom:0.5rem;
cursor:pointer;
font-family:‘Manrope’,sans-serif; font-size:0.9rem;
color:var(–ink);
display:flex; align-items:center; gap:0.75rem;
transition: all .16s;
}
.option:hover:not(:disabled) { border-color:var(–border2); background:var(–surface2); transform:translateX(3px); }
.option.opt-correct { border-color:var(–green); background:var(–green-s); color:var(–green); }
.option.opt-wrong   { border-color:var(–red);   background:var(–red-s);   color:var(–red);   }
.option.opt-reveal  { border-color:var(–green); color:var(–green); opacity:.55; }
.opt-key {
width:24px; height:24px; flex-shrink:0;
border-radius:5px; border:1.5px solid currentColor;
display:flex; align-items:center; justify-content:center;
font-family:‘JetBrains Mono’,monospace; font-size:0.68rem; font-weight:400;
opacity:.6;
}

/* ── RANGE ───────────────────────────────────────────── */
.range-wrap { margin-top:0.75rem; }
.range-row  { display:flex; justify-content:space-between; align-items:center; margin-bottom:0.5rem; font-size:0.85rem; }
.range-val  { font-family:‘JetBrains Mono’,monospace; font-size:0.8rem; color:var(–accent); font-weight:500; }
input[type=range] {
width:100%; -webkit-appearance:none;
height:3px; background:var(–border); border-radius:2px; outline:none; cursor:pointer;
}
input[type=range]::-webkit-slider-thumb {
-webkit-appearance:none; width:17px; height:17px;
border-radius:50%; background:var(–ink); cursor:pointer;
border:2.5px solid var(–bg);
box-shadow:0 1px 6px rgba(26,24,20,.2);
}

/* ── AI PANEL ────────────────────────────────────────── */
.ai-panel {
background:var(–ink);
border-radius:var(–r);
padding:1.25rem 1.5rem;
margin-top:1rem;
animation: rise .3s ease;
}
.ai-eyebrow { font-size:0.68rem; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:rgba(255,255,255,.4); margin-bottom:0.6rem; display:block; }
.ai-text { font-family:‘Instrument Serif’,serif; font-size:1.05rem; line-height:1.7; color:rgba(255,255,255,.85); }
.ai-input-row { display:flex; gap:0.5rem; margin-top:1rem; padding-top:1rem; border-top:1px solid rgba(255,255,255,.1); }
.ai-input {
flex:1; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.15);
border-radius:var(–r-sm); padding:0.65rem 0.875rem;
color:#fff; font-family:‘Manrope’,sans-serif; font-size:0.85rem; outline:none;
}
.ai-input::placeholder { color:rgba(255,255,255,.3); }
.ai-input:focus { border-color:rgba(255,255,255,.4); }
.ai-send {
background:#fff; color:var(–ink);
border:none; border-radius:var(–r-sm);
padding:0.65rem 1rem; cursor:pointer;
font-family:‘Manrope’,sans-serif; font-size:0.8rem; font-weight:700;
transition:opacity .18s;
}
.ai-send:hover { opacity:.85; }
.ai-premium-lock {
display:flex; align-items:center; gap:0.5rem;
padding:0.75rem 0; color:rgba(255,255,255,.35);
font-size:0.8rem;
}

/* ── DOTS LOADER ─────────────────────────────────────── */
.dots { display:flex; gap:4px; align-items:center; }
.dots span {
width:6px; height:6px; border-radius:50%;
background:rgba(255,255,255,.5);
animation: dotpop 1.1s infinite;
}
.dots span:nth-child(2) { animation-delay:.18s; }
.dots span:nth-child(3) { animation-delay:.36s; }
@keyframes dotpop {
0%,60%,100% { transform:scale(1); opacity:.4; }
30%          { transform:scale(1.35); opacity:1; }
}

/* ── LESSON CONTENT ──────────────────────────────────── */
.lesson-body {
font-family:‘Instrument Serif’,serif;
font-size:1.08rem;
line-height:1.85;
color:var(–ink2);
}
.lesson-body h3 {
font-family:‘Manrope’,sans-serif;
font-size:0.9rem; font-weight:700;
color:var(–ink); letter-spacing:.01em;
margin:1.5rem 0 0.5rem;
text-transform:uppercase;
}
.lesson-body p { margin-bottom:0.75rem; }
.lesson-body em { font-style:italic; color:var(–ink); }
.lesson-body strong { font-weight:600; color:var(–ink); font-style:normal; }
.lesson-body .hl {
background:rgba(45,91,227,.08);
color:var(–accent);
padding:0.1rem 0.35rem;
border-radius:3px;
font-style:normal;
}
.lesson-body .example {
background:var(–surface2);
border-left:2px solid var(–border2);
padding:1rem 1.25rem;
margin:1rem 0;
border-radius:0 var(–r-sm) var(–r-sm) 0;
font-size:0.95rem;
}
.lesson-body .formula {
font-family:‘JetBrains Mono’,monospace;
font-size:0.82rem;
background:var(–ink);
color:#a8c4ff;
padding:0.75rem 1rem;
border-radius:var(–r-sm);
margin:1rem 0;
display:block;
line-height:1.6;
}

/* ── COURSE CARD ─────────────────────────────────────── */
.course-card {
background:var(–surface);
border:1px solid var(–border);
border-radius:var(–r);
padding:1.5rem;
cursor:pointer;
transition: all .2s ease;
margin-bottom:0.75rem;
display:flex;
gap:1.25rem;
align-items:flex-start;
}
.course-card:hover { border-color:var(–border2); transform:translateY(-2px); box-shadow:0 8px 24px rgba(26,24,20,.07); }
.course-card.locked { opacity:.45; cursor:default; }
.course-card.locked:hover { transform:none; box-shadow:none; border-color:var(–border); }
.course-icon {
width:44px; height:44px; flex-shrink:0;
border-radius:10px;
background:var(–surface2);
border:1px solid var(–border);
display:flex; align-items:center; justify-content:center;
font-size:1.3rem;
}
.course-info { flex:1; min-width:0; }
.course-title { font-size:1rem; font-weight:700; margin-bottom:0.25rem; }
.course-desc  { font-size:0.82rem; color:var(–muted); line-height:1.5; margin-bottom:0.6rem; }
.course-meta  { display:flex; gap:0.5rem; flex-wrap:wrap; }

/* ── CHAPTER LIST ────────────────────────────────────── */
.chapter-item {
display:flex; align-items:center; gap:0.875rem;
padding:0.875rem 0;
border-bottom:1px solid var(–border);
}
.chapter-item:last-child { border-bottom:none; }
.chapter-num {
width:28px; height:28px; flex-shrink:0;
border-radius:7px;
background:var(–surface2);
border:1px solid var(–border);
display:flex; align-items:center; justify-content:center;
font-family:‘JetBrains Mono’,monospace;
font-size:0.68rem; color:var(–muted);
}
.chapter-num.done { background:var(–green); border-color:var(–green); color:#fff; }
.chapter-num.current { background:var(–accent); border-color:var(–accent); color:#fff; }
.chapter-name { font-size:0.9rem; font-weight:500; flex:1; }
.chapter-name.done { text-decoration:line-through; color:var(–muted); font-weight:400; }
.chapter-name.current { color:var(–accent); font-weight:600; }

/* ── SUMMARY CARD ────────────────────────────────────── */
.summary-item {
display:flex; gap:0.75rem; align-items:flex-start;
padding:0.75rem 0; border-bottom:1px solid var(–border);
}
.summary-item:last-child { border-bottom:none; }
.summary-dot {
width:6px; height:6px; border-radius:50%;
background:var(–accent); flex-shrink:0; margin-top:0.55rem;
}
.summary-text { font-size:0.9rem; line-height:1.6; color:var(–ink2); }

/* ── GENERATING ──────────────────────────────────────── */
.generating {
display:flex; flex-direction:column; align-items:center;
justify-content:center; min-height:50vh; gap:1.25rem; text-align:center;
}
.spin {
width:40px; height:40px; border-radius:50%;
border:2px solid var(–border);
border-top-color:var(–accent);
animation:spin .8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ── SEARCH ──────────────────────────────────────────── */
.search-wrap { position:relative; margin-bottom:1.25rem; }
.search-wrap .input { padding-left:2.5rem; }
.search-icon { position:absolute; left:0.875rem; top:50%; transform:translateY(-50%); color:var(–muted); font-size:0.9rem; pointer-events:none; }

/* ── MODULE PROGRESS ─────────────────────────────────── */
.mod-progress {
display:flex; gap:3px; margin:0.75rem 0;
}
.mod-pip {
height:4px; flex:1; border-radius:2px; background:var(–border);
transition:background .3s;
}
.mod-pip.done { background:var(–green); }
.mod-pip.active { background:var(–accent); }

/* ── PREMIUM GATE ────────────────────────────────────── */
.premium-banner {
background:linear-gradient(135deg,#1a1814,#2d2a24);
border-radius:var(–r);
padding:1.5rem;
color:#fff;
margin-top:1rem;
}
.premium-banner h3 { font-family:‘Instrument Serif’,serif; font-size:1.2rem; margin-bottom:0.4rem; }
.premium-banner p  { font-size:0.85rem; color:rgba(255,255,255,.6); margin-bottom:1rem; line-height:1.6; }

/* ── STAT GRID ───────────────────────────────────────── */
.stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:0.75rem; margin:1.25rem 0; }
.stat-cell {
background:var(–surface);
border:1px solid var(–border);
border-radius:var(–r-sm);
padding:1.1rem;
}
.stat-val { font-family:‘Instrument Serif’,serif; font-size:1.8rem; line-height:1; margin-bottom:0.25rem; }
.stat-lbl { font-size:0.75rem; color:var(–muted); font-weight:500; }

/* ── BACK BTN ────────────────────────────────────────── */
.back-btn {
display:inline-flex; align-items:center; gap:0.4rem;
font-size:0.82rem; font-weight:600; color:var(–muted);
cursor:pointer; background:none; border:none;
padding:0; margin-bottom:1.5rem;
transition:color .18s;
}
.back-btn:hover { color:var(–ink); }

/* ── UTILITY ─────────────────────────────────────────── */
.mt-xs { margin-top:.35rem; }
.mt-sm { margin-top:.75rem; }
.mt-md { margin-top:1.25rem; }
.mt-lg { margin-top:2rem; }
.mb-sm { margin-bottom:.75rem; }
.mb-md { margin-bottom:1.25rem; }
.gap-sm { gap:.5rem; }
.flex   { display:flex; }
.flex-col { flex-direction:column; }
.items-center { align-items:center; }
.justify-between { justify-content:space-between; }
.text-muted { color:var(–muted); }
.text-sm { font-size:.85rem; }
.text-xs { font-size:.75rem; }
.fw-600 { font-weight:600; }
.fw-700 { font-weight:700; }

@media(max-width:480px){
.screen { padding:0 1rem 3rem; }
.stat-grid { grid-template-columns:1fr 1fr; }
}
</style>

</head>
<body>
<div id="app"></div>

<script>
/* ═══════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════ */
const DB_KEY = 'lern_v3';

function loadState() {
  try {
    const raw = localStorage.getItem(DB_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

function saveState() {
  try { localStorage.setItem(DB_KEY, JSON.stringify(S)); } catch {}
}

const defaults = {
  screen: 'welcome',
  user: null,           // { name, email, isPremium }
  xp: 0,
  streak: 0,
  lastStudyDate: null,
  lang: 'ru',           // interface + default course lang

  // catalog
  searchQuery: '',
  enrolledCourses: {},  // { courseId: { progress, completedLessons:[], generatedLessons:{} } }

  // current course
  courseId: null,

  // settings
  level: 'practitioner',
  duration: 20,
  goal: 'interest',
  courseLang: 'ru',

  // placement
  placementStep: 0,
  placementScore: 0,
  placementQs: [],

  // lesson
  lessonIdx: 0,
  lessonTotal: 0,
  lessonStep: 0,        // 0=gen 1=content 2=question 3=feedback 4=summary
  lessonData: null,     // { title, body, question:{text,options,correct,explanation}, keypoints:[] }
  selectedAnswer: null,
  lastCorrect: false,
  aiMessages: [],

  // create course
  newCourseTitle: '',
  newCourseDesc: '',
};

const saved = loadState();
const S = saved ? { ...defaults, ...saved, screen: 'welcome' } : { ...defaults };

// Update streak
const today = new Date().toDateString();
if (S.lastStudyDate && S.lastStudyDate !== today) {
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  if (S.lastStudyDate !== yesterday) S.streak = 0;
}

/* ═══════════════════════════════════════════════════════
   CATALOG DATA
═══════════════════════════════════════════════════════ */
const CATALOG = [
  {
    id: 'cfo',
    icon: '📊',
    tag: 'Финансы',
    title: 'Думай как CFO',
    desc: 'Отчётность, оценка компаний, структура капитала — от основ до сделок',
    modules: ['Финансовая отчётность', 'Оценка и стоимость', 'Управление капиталом', 'M&A и сделки'],
    lessons: 8,
    free: true,
  },
  {
    id: 'quantum',
    icon: '⚛️',
    tag: 'Наука',
    title: 'Квантовый мир',
    desc: 'Суперпозиция, запутанность и квантовые компьютеры — без формул',
    modules: ['Основы квантового мира', 'Запутанность', 'Квантовые технологии'],
    lessons: 6,
    free: false,
  },
  {
    id: 'chemistry',
    icon: '🧪',
    tag: 'Наука',
    title: 'Химия вокруг нас',
    desc: 'Почему всё горит, ржавеет и взрывается — химия в жизни',
    modules: ['Атомы и связи', 'Реакции и энергия', 'Химия в быту'],
    lessons: 6,
    free: false,
  },
  {
    id: 'macro',
    icon: '🌍',
    tag: 'Экономика',
    title: 'Макроэкономика за кофе',
    desc: 'Инфляция, ставки, кризисы — как устроена мировая экономика',
    modules: ['Деньги и инфляция', 'Центробанки', 'Кризисы и циклы'],
    lessons: 6,
    free: false,
  },
];

function getCourse(id) { return CATALOG.find(c => c.id === id) || S.enrolledCourses[id]?._meta; }
function getEnrolled(id) { return S.enrolledCourses[id]; }
function getProgress(id) {
  const e = getEnrolled(id);
  if (!e) return 0;
  const c = getCourse(id);
  return c ? Math.round((e.completedLessons.length / c.lessons) * 100) : 0;
}

}

/* ═══════════════════════════════════════════════════════
   SCREEN: CATALOG
═══════════════════════════════════════════════════════ */
function catalog() {
  const q = S.searchQuery.toLowerCase();
  const filtered = CATALOG.filter(c =>
    !q || c.title.toLowerCase().includes(q) || c.tag.toLowerCase().includes(q) || c.desc.toLowerCase().includes(q)
  );
  const name = S.user?.name?.split(' ')[0] || '';

  return `
  <div class="screen" style="padding-top:0;">
    <div class="wrap">
      <div class="topbar">
        <div class="logo">lern.</div>
        <div class="topbar-right">
          ${S.streak > 0 ? '<div class="streak-badge">🔥 ' + S.streak + '</div>' : ''}
          <div class="xp-badge">⚡ ${S.xp} XP</div>
        </div>
      </div>

      <div style="margin-bottom:1.5rem;">
        <span class="eyebrow eyebrow-accent">${name ? "Привет, " + name : "Каталог"}</span>
        <h2 class="title">Выбери курс</h2>
      </div>

      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input class="input" id="search-input" placeholder="Поиск курсов..."
          value="${S.searchQuery}"
          oninput="S.searchQuery=this.value;render()" />
      </div>

      ${filtered.map(c => {
        const prog = getProgress(c.id);
        const enrolled = !!getEnrolled(c.id);
        const locked = !c.free && !S.user?.isPremium && !enrolled;
        return `
        <div class="course-card ${locked ? 'locked' : ''}" onclick="${!locked ? 'selectCourse(' + JSON.stringify(c.id) + ')' : 'showPremium()'}">
          <div class="course-icon">${c.icon}</div>
          <div class="course-info">
            <div class="flex items-center justify-between mb-sm">
              <span class="tag ${c.free ? 'tag-green' : ''}">${c.tag}${!c.free ? ' · Premium' : ''}</span>
              ${locked ? '<span class="tag">🔒 Premium</span>' : ''}
              ${enrolled && prog > 0 ? '<span class="text-xs text-muted mono">' + prog + '%</span>' : ''}

            <div class="course-title">${c.title}</div>
            <div class="course-desc">${c.desc}</div>
            ${enrolled && prog > 0 ? `
              <div class="mod-progress">
                ${c.modules.map((_,i) => {
                  const e = getEnrolled(c.id);
                  const lessonsPerMod = Math.ceil(c.lessons / c.modules.length);
                  const modDone = e.completedLessons.filter(l => Math.floor(l/lessonsPerMod)===i).length;
                  return `<div class="mod-pip ${modDone === lessonsPerMod ? 'done' : modDone > 0 ? 'active' : ''}"></div>`;
                }).join('')}
              </div>
            ` : ''}
            <div class="course-meta">
              ${enrolled ? '<span class="tag tag-accent">Начат</span>' : ''}
              <span class="tag">📚 ${c.lessons} уроков</span>
            </div>
          </div>
        </div>`;
      }).join('')}

      ${!S.user?.isPremium ? `
      <div class="premium-banner mt-md">
        <h3>Lern Premium</h3>
        <p>Все курсы, офлайн-режим, создание своих курсов и AI-репетитор без ограничений.</p>
        <button class="btn btn-full" style="background:#fff;color:var(--ink);font-size:0.875rem;" onclick="activatePremium()">
          Попробовать Premium →
        </button>
      </div>
      ` : ''}

      ${S.user?.isPremium ? `
      <button class="btn btn-surface btn-full mt-md" onclick="go('create')">
        + Создать свой курс
      </button>
      ` : ''}
    </div>
  </div>`;
}

/* ═══════════════════════════════════════════════════════
   SCREEN: COURSE DETAIL
═══════════════════════════════════════════════════════ */
function course() {
  const c = getCourse(S.courseId);
  if (!c) { go('catalog'); return ''; }
  const enrolled = getEnrolled(S.courseId);
  const prog = getProgress(S.courseId);
  const completedLessons = enrolled?.completedLessons || [];

  return `
  <div class="screen" style="padding-top:1.25rem;">
    <div class="wrap">
      <button class="back-btn" onclick="go('catalog')">← Каталог</button>

      <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;">
        <div class="course-icon" style="width:56px;height:56px;font-size:1.6rem;border-radius:12px;">${c.icon}</div>
        <div>
          <span class="tag ${c.free ? 'tag-green' : 'tag-amber'}">${c.tag}</span>
          <h2 class="title" style="margin-top:0.3rem;">${c.title}</h2>
        </div>
      </div>

      <p class="body-text mb-md">${c.desc}</p>

      ${prog > 0 ? `
      <div class="card" style="padding:1.25rem;margin-bottom:1rem;">
        <div class="flex justify-between items-center mb-sm">
          <span class="eyebrow" style="margin:0;">Прогресс</span>
          <span class="mono text-xs" style="color:var(--accent);">${prog}%</span>
        </div>
        <div class="pbar" style="margin:0.5rem 0 0;height:5px;">
          <div class="pbar-fill" style="width:${prog}%;"></div>
        </div>
      </div>
      ` : ''}

      <div class="card">
        <span class="eyebrow">Программа</span>
        ${c.modules.map((m, mi) => {
          const lessonsPerMod = Math.ceil(c.lessons / c.modules.length);
          const modStart = mi * lessonsPerMod;
          const modLessons = Array.from({length:lessonsPerMod}, (_,i) => modStart+i).filter(i=>i<c.lessons);
          const allDone = modLessons.every(i => completedLessons.includes(i));
          const anyDone = modLessons.some(i => completedLessons.includes(i));
          const isCurrent = !allDone && anyDone;
          return `
          <div class="chapter-item">
            <div class="chapter-num ${allDone?'done':isCurrent?'current':''}">
              ${allDone ? '✓' : mi+1}
            </div>
            <div class="chapter-name ${allDone?'done':isCurrent?'current':''}">${m}</div>
            <span class="text-xs text-muted mono">${modLessons.length} ур.</span>
          </div>`;
        }).join('')}
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.6rem;margin:1rem 0;">
        ${[
          ['📚', c.lessons + ' уроков'],
          ['🤖', 'AI-репетитор'],
          ['📥', 'Офлайн'],
        ].map(([i,l]) => `
          <div class="card" style="padding:1rem;margin:0;text-align:center;">
            <div style="font-size:1.2rem;margin-bottom:0.25rem;">${i}</div>
            <div class="text-xs text-muted">${l}</div>
          </div>
        `).join('')}
      </div>

      <button class="btn btn-primary btn-full btn-lg" onclick="go('settings')">
        ${enrolled && prog > 0 ? 'Продолжить курс →' : 'Настроить и начать →'}
      </button>
    </div>
  </div>`;
}

            `<option value="${v}" ${S.courseLang===v?'selected':''}>${l}</option>`
          ).join('')}
        </select>
      </div>

      <button class="btn btn-primary btn-full btn-lg mt-sm" onclick="startPlacement()">

  return `

/* ═══════════════════════════════════════════════════════
   SCREEN: LESSON
═══════════════════════════════════════════════════════ */
function lesson() {
  const c = getCourse(S.courseId);

  // Step 0 — generating
  if (S.lessonStep === 0) {
    return `
    <div class="screen" style="justify-content:center;">
      <div class="wrap">
        <div class="generating">
          <div class="spin"></div>
          <div>
            <span class="eyebrow eyebrow-accent">Генерирую урок ${S.lessonIdx+1}</span>
            <p class="text-sm text-muted mt-xs">Подготавливаю материал на уровне «${lvlLabel()}»...</p>
          </div>
        </div>
      </div>
    </div>`;
  }

  // Step 1 — content
  if (S.lessonStep === 1) {
    const pct = (S.lessonIdx / S.lessonTotal) * 100;
    return `
    <div class="screen" style="padding-top:1.25rem;">
      <div class="wrap">
        <div class="flex justify-between items-center" style="margin-bottom:1rem;">
          <button class="back-btn" style="margin:0;" onclick="go('catalog')">← Курсы</button>
          <div class="xp-badge">⚡ ${S.xp} XP</div>
        </div>
        <div class="pbar"><div class="pbar-fill" style="width:${pct}%"></div></div>

        <span class="eyebrow eyebrow-accent">${c?.title} · Урок ${S.lessonIdx+1} из ${S.lessonTotal}</span>
        <h2 class="title" style="margin:0.4rem 0 1.5rem;">${S.lessonData?.title || ''}</h2>

        <div class="card" style="padding:1.75rem;">
          <div class="lesson-body">${S.lessonData?.body || ''}</div>
        </div>

        <button class="btn btn-primary btn-full btn-lg mt-sm" onclick="S.lessonStep=2;render()">
          К вопросу →
        </button>
      </div>
    </div>`;
  }

  // Step 2 — question
  if (S.lessonStep === 2) {
    const q = S.lessonData?.question;
    const keys = ['A','B','C','D'];
    return `
    <div class="screen" style="padding-top:1.25rem;">
      <div class="wrap">
        <div class="flex justify-between items-center" style="margin-bottom:1rem;">
          <button class="back-btn" style="margin:0;" onclick="S.lessonStep=1;render()">← Теория</button>
          <div class="xp-badge">⚡ ${S.xp} XP</div>
        </div>

        <span class="eyebrow eyebrow-accent">Проверь себя</span>
        <p class="serif" style="font-size:1.15rem;line-height:1.55;margin:0.6rem 0 1.5rem;color:var(--ink);">${q?.text || ''}</p>

        ${(q?.options||[]).map((o,i) => `
          <button class="option" onclick="answerLesson(${i})">
            <span class="opt-key">${keys[i]}</span>${o}
          </button>
        `).join('')}
      </div>
    </div>`;
  }

  // Step 3 — feedback
  if (S.lessonStep === 3) {
    const q = S.lessonData?.question;
    const keys = ['A','B','C','D'];
    const isPremium = S.user?.isPremium;

    return `
    <div class="screen" style="padding-top:1.25rem;">
      <div class="wrap">
        <div class="flex justify-between items-center" style="margin-bottom:1rem;">
          <span class="tag ${S.lastCorrect?'tag-green':''}">
            ${S.lastCorrect ? '✓ Верно' : '✗ Не совсем'}
          </span>
          <div class="xp-badge">⚡ ${S.xp} XP</div>
        </div>

        <p class="serif" style="font-size:1.1rem;line-height:1.5;margin-bottom:1.25rem;color:var(--ink);">${q?.text||''}</p>

        ${(q?.options||[]).map((o,i) => {
          let cls = '';
          if (i === q.correct) cls = 'opt-correct';
          else if (i === S.selectedAnswer) cls = 'opt-wrong';
          return `<button class="option ${cls}" disabled><span class="opt-key">${keys[i]}</span>${o}</button>`;
        }).join('')}

        <div class="ai-panel">
          <span class="ai-eyebrow">AI Репетитор</span>
          <div class="ai-text" id="ai-body"><div class="dots"><span></span><span></span><span></span></div></div>
          ${isPremium ? `
          <div class="ai-input-row">
            <input class="ai-input" id="ai-q" placeholder="Задай уточняющий вопрос..."
              onkeydown="if(event.key==='Enter')sendAI()" />
            <button class="ai-send" onclick="sendAI()">→</button>
          </div>
          ` : `
          <div class="ai-premium-lock">
            🔒 Уточняющие вопросы — функция Premium
            <button class="btn btn-sm" style="margin-left:auto;background:rgba(255,255,255,.1);color:#fff;border:none;" onclick="activatePremium()">Открыть</button>
          </div>
          `}
        </div>

        <button class="btn btn-primary btn-full btn-lg mt-md" onclick="S.lessonStep=4;render()">
          Резюме урока →
        </button>
      </div>
    </div>`;
  }

  // Step 4 — summary
  if (S.lessonStep === 4) {
    const kp = S.lessonData?.keypoints || [];
    return `
    <div class="screen" style="padding-top:1.25rem;">
      <div class="wrap">
        <span class="eyebrow eyebrow-accent">Резюме урока</span>
        <h2 class="title" style="margin:0.4rem 0 1.25rem;">${S.lessonData?.title||''}</h2>

        <div class="card">
          <span class="eyebrow">Ключевые тезисы</span>
          ${kp.length ? kp.map(k => `
            <div class="summary-item">
              <div class="summary-dot"></div>
              <div class="summary-text">${k}</div>
            </div>
          `).join('') : '<p class="text-sm text-muted">Загрузка...</p>'}
        </div>

        <div class="stat-grid">
          <div class="stat-cell">
            <div class="stat-val">${S.lastCorrect?'+30':'+10'}</div>
            <div class="stat-lbl">XP за урок</div>
          </div>
          <div class="stat-cell">
            <div class="stat-val">${S.lessonIdx+1}/${S.lessonTotal}</div>
            <div class="stat-lbl">Прогресс</div>
          </div>
        </div>

        <button class="btn btn-primary btn-full btn-lg mt-sm" onclick="nextLesson()">
          ${S.lessonIdx+1 < S.lessonTotal ? 'Следующий урок →' : 'Завершить курс →'}
        </button>
        <button class="btn btn-ghost btn-full mt-sm" style="margin-top:0.5rem;" onclick="go('catalog')">
          Вернуться к курсам
        </button>
      </div>
    </div>`;
  }

  return '<div class="screen"></div>';
}

/* ═══════════════════════════════════════════════════════
   SCREEN: RESULT
═══════════════════════════════════════════════════════ */
function result() {
  const c = getCourse(S.courseId);
  const name = S.user?.name?.split(' ')[0] || '';
  return `
  <div class="screen" style="justify-content:center;min-height:100vh;">
    <div class="wrap" style="text-align:center;">
      <div style="font-size:3rem;margin-bottom:1rem;">🎯</div>
      <span class="eyebrow eyebrow-accent">Курс завершён</span>
      <h2 class="title" style="margin:0.5rem 0;">${c?.title}</h2>
      ${name ? '<p class="body-text mt-xs">Отлично, ' + name + '!</p>' : ''}

      <div class="stat-grid mt-md">
        <div class="stat-cell"><div class="stat-val">${S.xp}</div><div class="stat-lbl">Всего XP</div></div>
        <div class="stat-cell"><div class="stat-val">${S.streak}🔥</div><div class="stat-lbl">Дней подряд</div></div>
      </div>

      <button class="btn btn-primary btn-full btn-lg mt-md" onclick="go('catalog')">К каталогу →</button>
    </div>
  </div>`;
}

/* ═══════════════════════════════════════════════════════
   SCREEN: CREATE COURSE (PREMIUM)
═══════════════════════════════════════════════════════ */
function create() {
  return `
  <div class="screen" style="padding-top:1.25rem;">
    <div class="wrap">
      <button class="back-btn" onclick="go('catalog')">← Каталог</button>

      <span class="eyebrow eyebrow-accent">Premium · Создать курс</span>
      <h2 class="title mb-md">Свой курс</h2>
      <p class="body-text text-sm mb-md">Введи тему — AI сгенерирует полный курс и сохранит его офлайн.</p>

      <div class="field">
        <label>Название или тема курса</label>
        <input class="input" id="nc-title" placeholder="Например: История джаза" value="${S.newCourseTitle}" />
      </div>
      <div class="field">
        <label>Дополнительный контекст (необязательно)</label>
        <textarea class="input" id="nc-desc" rows="3"
          placeholder="Для кого, какой фокус, что хочешь понять..."
          style="resize:vertical;">${S.newCourseDesc}</textarea>

```
  </div>

  <div class="card">
    <span class="eyebrow">Параметры</span>
    <div class="pills mt-sm">
      ${[['beginner','Новичок'],['practitioner','Практик'],['expert','Эксперт']].map(([id,l]) =>
        `<div class="pill ${S.level===id?'on':''}" onclick="S.level='${id}';render()">${l}</div>`
      ).join('')}
    </div>
    <div class="range-wrap mt-sm">
      <div class="range-row">
        <span class="text-sm text-muted">Уроков в курсе</span>
        <span class="range-val" id="lc-val">${S.lessonTotal||6}</span>
      </div>
      <input type="range" min="3" max="12" step="1" value="${S.lessonTotal||6}"
        oninput="S.lessonTotal=+this.value;document.getElementById('lc-val').textContent=this.value" />
    </div>
  </div>

  <button class="btn btn-primary btn-full btn-lg mt-sm" onclick="createCourse()">
    Создать курс →

```

}

/* ═══════════════════════════════════════════════════════
ACTIONS
═══════════════════════════════════════════════════════ */
function go(screen) { S.screen = screen; render(); }

function quickLogin() {
const name = prompt(‘Введи своё имя:’);
if (!name) return;
S.user = { name: name.trim(), email: ‘’, isPremium: false };
go(‘catalog’);
}

function doRegister() {
const name = (document.getElementById(‘r-name’)?.value || ‘’).trim() || ‘Пользователь’;
const email = (document.getElementById(‘r-email’)?.value || ‘’).trim();
S.user = { name, email, isPremium: false };
go(‘catalog’);
}

function selectCourse(id) {
S.courseId = id;
go(‘course’);
}

function liveRange(v) {
S.duration = +v;
const lbl = v<=15?‘Быстро’:v<=25?‘Стандартно’:v<=40?‘Углублённо’:‘Полное погружение’;
const el = document.getElementById(‘dur-label’);
const ev = document.getElementById(‘dur-val’);
if (el) el.textContent = lbl;
if (ev) ev.textContent = v + ’ мин’;
}

function lvlLabel() {
return {beginner:‘Новичок’,practitioner:‘Практик’,expert:‘Эксперт’}[S.level];
}

function goalText() {
return {interest:‘из интереса’,career:‘для карьеры’,work:‘для работы’}[S.goal];
}

function activatePremium() {
if (confirm(‘Активировать Premium-режим (демо)?’)) {
if (!S.user) S.user = { name:‘Пользователь’, email:’’, isPremium:false };
S.user.isPremium = true;
render();
}
}

function showPremium() {
alert(‘Этот курс доступен в Premium. Нажмите «Попробовать Premium» внизу страницы.’);
}

/* ═══════════════════════════════════════════════════════
PLACEMENT
═══════════════════════════════════════════════════════ */
async function startPlacement() {
S.placementQs = [];
S.placementStep = 0;
S.placementScore = 0;
go(‘placement’);

const c = getCourse(S.courseId);
const langNote = S.courseLang !== ‘ru’ ? ’Questions in ’ + S.courseLang + ‘.’ : ‘Вопросы на русском языке.’;

const prompt = `Составь тест для определения уровня знаний по теме: "${c?.title}". Ровно 4 вопроса с возрастающей сложностью. ${langNote} Верни ТОЛЬКО валидный JSON массив без markdown: [{"text":"...","options":["...","...","...","..."],"correct":0}] correct — индекс правильного ответа (0–3). Дистракторы должны быть правдоподобными.`;

try {
const r = await callAI(prompt);
S.placementQs = JSON.parse(r.replace(/`{3}json|`{3}/g,’’).trim());
} catch {
skipPlacement();
return;
}
render();
}

function answerPlacement(idx) {
if (S.placementQs[S.placementStep].correct === idx) S.placementScore++;
S.placementStep++;
if (S.placementStep >= S.placementQs.length) {
const ratio = S.placementScore / S.placementQs.length;
S.level = ratio <= 0.3 ? ‘beginner’ : ratio <= 0.7 ? ‘practitioner’ : ‘expert’;
beginCourse();
} else render();
}

function skipPlacement() { beginCourse(); }

/* ═══════════════════════════════════════════════════════
COURSE ENGINE
═══════════════════════════════════════════════════════ */
function beginCourse() {
const c = getCourse(S.courseId);
if (!S.enrolledCourses[S.courseId]) {
S.enrolledCourses[S.courseId] = { completedLessons: [], generatedLessons: {} };
}
const enrolled = S.enrolledCourses[S.courseId];
// Find next uncompleted lesson
const nextLesson = enrolled.completedLessons.length < c.lessons
? enrolled.completedLessons.length : 0;
S.lessonIdx = nextLesson;
S.lessonTotal = c.lessons;
S.lessonStep = 0;
S.lessonData = null;
S.aiMessages = [];
go(‘lesson’);
generateLesson();
}

async function generateLesson() {
const c = getCourse(S.courseId);
const enrolled = S.enrolledCourses[S.courseId];

// Check cache (offline support)
if (enrolled?.generatedLessons?.[S.lessonIdx]) {
S.lessonData = enrolled.generatedLessons[S.lessonIdx];
S.lessonStep = 1;
render();
return;
}

const moduleIdx = Math.floor(S.lessonIdx / Math.ceil(S.lessonTotal / c.modules.length));
const moduleName = c.modules[Math.min(moduleIdx, c.modules.length-1)];
const langInstr = S.courseLang===‘ru’ ? ‘Весь контент на русском языке.’ : ’All content in ’ + S.courseLang + ‘.’;

const prompt = `Ты AI-преподаватель. Создай урок ${S.lessonIdx+1} из ${S.lessonTotal} для курса “${c.title}”, модуль “${moduleName}”.

Параметры:

- Уровень: ${lvlLabel()}
- Цель: ${goalText()}
- Длина чтения: ~${S.duration} минут
  ${langInstr}

Верни ТОЛЬКО валидный JSON без markdown:
{
“title”: “Название урока”,
“body”: “HTML-контент”,
“question”: {“text”:”…”,“options”:[”…”,”…”,”…”,”…”],“correct”:0,“explanation”:”…”},
“keypoints”: [“тезис 1”,“тезис 2”,“тезис 3”]
}

HTML теги для body: <p>, <h3>, <em class="hl">, <div class="example">, <code class="formula">
Примеры реальные, конкретные, с цифрами.
keypoints — 3 ключевых вывода урока одной фразой каждый.`;

try {
const raw = await callAI(prompt, 1800);
const data = JSON.parse(raw.replace(/`{3}json|`{3}/g,’’).trim());
S.lessonData = data;
// Cache for offline
if (enrolled) enrolled.generatedLessons[S.lessonIdx] = data;
S.lessonStep = 1;
} catch(e) {
S.lessonData = {
title: ‘Ошибка загрузки’,
body: ‘<p>Не удалось загрузить урок. Проверьте соединение с интернетом.</p>’,
question: { text:‘Тест недоступен’, options:[’—’,’—’,’—’,’—’], correct:0, explanation:’’ },
keypoints: []
};
S.lessonStep = 1;
}
render();
}

function answerLesson(idx) {
S.selectedAnswer = idx;
S.lastCorrect = idx === S.lessonData?.question?.correct;
S.xp += S.lastCorrect ? 30 : 10;
// Update streak
const today = new Date().toDateString();
if (S.lastStudyDate !== today) {
S.streak = (S.lastStudyDate === new Date(Date.now()-86400000).toDateString()) ? S.streak+1 : 1;
S.lastStudyDate = today;
}
S.lessonStep = 3;
render();
setTimeout(loadAIFeedback, 80);
}

async function loadAIFeedback() {
const q = S.lessonData?.question;
const keys = [‘A’,‘B’,‘C’,‘D’];
const prompt = `AI-репетитор. Ответь 2-3 предложениями, без markdown. Вопрос: "${q?.text}" Правильный: ${keys[q?.correct]}. ${q?.options?.[q?.correct]} Ответ пользователя: ${keys[S.selectedAnswer]}. ${q?.options?.[S.selectedAnswer]} Результат: ${S.lastCorrect?'ВЕРНО':'НЕВЕРНО'} Объяснение: "${q?.explanation}" Уровень: ${lvlLabel()} ${S.lastCorrect?'Подтверди + одна интересная деталь.':'Объясни ошибку, supportive тон.'}`;

try {
const text = await callAI(prompt);
S.aiMessages = [{role:‘assistant’,content:text}];
const el = document.getElementById(‘ai-body’);
if (el) el.innerHTML = text;
} catch {
const el = document.getElementById(‘ai-body’);
if (el) el.innerHTML = q?.explanation || ‘Объяснение недоступно.’;
}
}

async function sendAI() {
const input = document.getElementById(‘ai-q’);
if (!input?.value.trim()) return;
const q = input.value.trim();
input.value = ‘’;
S.aiMessages.push({role:‘user’,content:q});

const bodyEl = document.getElementById(‘ai-body’);
if (bodyEl) bodyEl.innerHTML += `<br><br><span style="color:rgba(255,255,255,.5);font-size:0.82rem;">Ты:</span> ${q}<br><div class="dots mt-xs"><span></span><span></span><span></span></div>`;

const c = getCourse(S.courseId);
try {
const text = await callAI(q, 800, [
{role:‘user’, content:‘Курс: “’ + (c && c.title) + ‘”, урок: “’ + (S.lessonData && S.lessonData.title) + ‘”. Уровень: ’ + lvlLabel() + ‘.’},
…S.aiMessages.slice(0,-1)
]);
S.aiMessages.push({role:‘assistant’,content:text});
if (bodyEl) {
const dots = bodyEl.querySelector(’.dots’);
if (dots) dots.remove();
bodyEl.innerHTML += `<br><span style="color:rgba(255,255,255,.6);font-size:0.82rem;">AI:</span> ${text}`;
}
} catch {
if (bodyEl) {
const dots = bodyEl.querySelector(’.dots’);
if (dots) dots.innerHTML = ‘Ошибка соединения.’;
}
}
}

function nextLesson() {
const enrolled = S.enrolledCourses[S.courseId];
if (enrolled && !enrolled.completedLessons.includes(S.lessonIdx)) {
enrolled.completedLessons.push(S.lessonIdx);
}
S.lessonIdx++;
if (S.lessonIdx >= S.lessonTotal) {
go(‘result’);
return;
}
S.lessonStep = 0;
S.lessonData = null;
S.aiMessages = [];
go(‘lesson’);
generateLesson();
}

/* ═══════════════════════════════════════════════════════
CREATE CUSTOM COURSE
═══════════════════════════════════════════════════════ */
async function createCourse() {
const title = document.getElementById(‘nc-title’)?.value.trim();
const desc = document.getElementById(‘nc-desc’)?.value.trim();
if (!title) { alert(‘Введи название курса’); return; }

S.newCourseTitle = title;
S.newCourseDesc = desc;

const lessonCount = S.lessonTotal || 6;
const prompt = `Создай структуру курса на тему: "${title}". ${desc ? 'Контекст: ' + desc : ''} Уровень: ${lvlLabel()}. Количество уроков: ${lessonCount}. Верни ТОЛЬКО валидный JSON без markdown: { "id": "custom_${Date.now()}", "icon": "📖", "tag": "Мой курс", "title": "${title}", "desc": "краткое описание курса 1 предложение", "modules": ["Модуль 1","Модуль 2","Модуль 3"], "lessons": ${lessonCount}, "free": true }`;

try {
const raw = await callAI(prompt);
const meta = JSON.parse(raw.replace(/`{3}json|`{3}/g,’’).trim());
meta.isCustom = true;

```
// Add to catalog in state
CATALOG.push(meta);
S.enrolledCourses[meta.id] = { completedLessons:[], generatedLessons:{}, _meta: meta };
S.courseId = meta.id;
go('course');
```

} catch(e) {
alert(‘Не удалось создать курс. Попробуйте ещё раз.’);
}
}

/* ═══════════════════════════════════════════════════════
AI HELPER
═══════════════════════════════════════════════════════ */
async function callAI(prompt, maxTokens=1000, extraMessages=[]) {
const messages = […extraMessages, {role:‘user’,content:prompt}];
const resp = await fetch(“https://api.anthropic.com/v1/messages”, {
method:“POST”,
headers:{“Content-Type”:“application/json”},
body:JSON.stringify({
model:“claude-sonnet-4-20250514”,
max_tokens: maxTokens,
messages
})
});
const data = await resp.json();
return data.content?.[0]?.text || ‘’;
}

/* ═══════════════════════════════════════════════════════
INIT
═══════════════════════════════════════════════════════ */
render();
</script>
